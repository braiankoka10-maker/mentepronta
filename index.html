<!DOCTYPE html>
<html lang="it" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<meta name="description" content="MentePronta — Allenati ogni giorno con le parole e la logica. Puzzle italiani gratuiti: Parole, Cruciverba, Zip, Tango, Queen, Patches, Memoria, Anagramma.">
<title>MentePronta · Puzzle del giorno</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
<link href="https://fonts.googleapis.com/css2?family=Jost:wght@400;500;600;700;800;900&amp;family=Inter:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet">
<style>
/* ===================== DESIGN TOKENS ===================== */
:root {
  --color-bg: #0d0d10;
  --color-surface: #17181c;
  --color-surface-2: #22242a;
  --color-border: rgba(255,255,255,.09);
  --color-text: #f0f0f0;
  --color-text-muted: #888;
  --color-primary: #3b82f6;
  --color-primary-hover: #2563eb;
  --color-success: #22c55e;
  --color-error: #f87171;
  --color-warning: #fbbf24;
  --color-gold: #fbbf24;
  --color-correct: #538d4e;
  --color-present: #b59f3b;
  --color-absent: #3a3a3c;
  --radius-sm: 4px;
  --radius-md: 8px;
  --radius-lg: 12px;
  --transition: 180ms cubic-bezier(0.16, 1, 0.3, 1);
  --shadow-sm: 0 1px 2px oklch(from var(--color-text) l c h / 0.06), 0 1px 3px oklch(from var(--color-text) l c h / 0.08);
  --shadow-md: 0 4px 12px oklch(from var(--color-text) l c h / 0.08), 0 2px 4px oklch(from var(--color-text) l c h / 0.06);
  --shadow-lg: 0 12px 32px oklch(from var(--color-text) l c h / 0.14);
  --border-alpha: 1px solid oklch(from var(--color-text) l c h / 0.12);
  --font-body: 'Inter', system-ui, -apple-system, sans-serif;
  --font-display: 'Instrument Serif', Georgia, serif;
  --fs-xs: clamp(11px, 0.7rem + 0.1vw, 12px);
  --fs-sm: clamp(13px, 0.8rem + 0.1vw, 14px);
  --fs-base: clamp(15px, 0.9rem + 0.2vw, 16px);
  --fs-lg: clamp(18px, 1rem + 0.4vw, 20px);
  --fs-xl: clamp(24px, 1.4rem + 1vw, 28px);
  --fs-2xl: clamp(32px, 2rem + 2vw, 40px);
}
/* dark-only — no light theme */
/* ===================== RESET / BASE ===================== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { -webkit-text-size-adjust: 100%; }
body {
  font-family: var(--font-body);
  font-size: var(--fs-base);
  line-height: 1.5;
  color: var(--color-text);
  background: var(--color-bg);
  min-height: 100vh;
  transition: background var(--transition), color var(--transition);
  -webkit-font-smoothing: antialiased;
}
button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
:focus-visible { outline: 3px solid var(--color-primary); outline-offset: 2px; border-radius: var(--radius-sm); }
a { color: var(--color-primary); }
.visually-hidden { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0 0 0 0); white-space: nowrap; border: 0; }

/* ===================== HEADER ===================== */
header {
  position: sticky; top: 0; z-index: 50;
  background: oklch(from var(--color-surface) l c h / 0.9);
  backdrop-filter: blur(10px);
  border-bottom: var(--border-alpha);
}
.header-inner {
  max-width: 1100px; margin: 0 auto;
  display: flex; align-items: center; gap: 1rem;
  padding: 0.7rem 1rem;
}
.logo {
  font-family: var(--font-display);
  font-size: var(--fs-xl); font-weight: 400;
  letter-spacing: 0.2px; color: var(--color-text);
  text-decoration: none; white-space: nowrap;
}
.logo b { color: var(--color-primary); font-weight: 400; }
nav.tabs {
  display: flex; gap: 0.15rem; flex: 1; overflow-x: auto;
  scrollbar-width: none; -ms-overflow-style: none;
}
nav.tabs::-webkit-scrollbar { display: none; }
nav.tabs a {
  padding: 0.4rem 0.7rem; border-radius: var(--radius-md);
  font-size: var(--fs-sm); font-weight: 500; color: var(--color-text-muted);
  text-decoration: none; white-space: nowrap; transition: var(--transition);
}
nav.tabs a:hover { background: var(--color-surface-2); color: var(--color-text); }
nav.tabs a.active { background: var(--color-primary); color: #fff; }
.icon-btn {
  display: grid; place-items: center;
  width: 40px; height: 40px; border-radius: var(--radius-md);
  color: var(--color-text-muted); transition: var(--transition); flex-shrink: 0;
}
.icon-btn:hover { background: var(--color-surface-2); color: var(--color-text); }

/* ===================== LAYOUT ===================== */
main { max-width: 1100px; margin: 0 auto; padding: 1.5rem 1rem 3rem; }
.view { display: none; animation: viewIn 0.25s ease; }
.view.active { display: block; }
@keyframes viewIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
.game-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 1rem; margin-bottom: 1rem; flex-wrap: wrap; }
.game-head h1 { font-family: var(--font-display); font-size: var(--fs-2xl); font-weight: 400; line-height: 1.1; }
.game-head p { color: var(--color-text-muted); font-size: var(--fs-sm); margin-top: 0.2rem; max-width: 46ch; }
.game-head .actions { display: flex; gap: 0.4rem; flex-shrink: 0; }
.chip-btn {
  display: inline-flex; align-items: center; gap: 0.35rem;
  padding: 0.5rem 0.8rem; border-radius: var(--radius-md);
  background: var(--color-surface); border: var(--border-alpha);
  font-size: var(--fs-sm); font-weight: 500; color: var(--color-text);
  box-shadow: var(--shadow-sm); transition: var(--transition); min-height: 40px;
}
.chip-btn:hover { background: var(--color-surface-2); }
.chip-btn.toggle.on { background: var(--color-primary); color: #fff; border-color: transparent; }
.btn-primary {
  display: inline-flex; align-items: center; justify-content: center; gap: 0.4rem;
  padding: 0.7rem 1.2rem; border-radius: var(--radius-md);
  background: var(--color-primary); color: #fff; font-weight: 600; font-size: var(--fs-base);
  transition: var(--transition); min-height: 44px;
}
.btn-primary:hover { background: var(--color-primary-hover); }
.btn-ghost {
  display: inline-flex; align-items: center; justify-content: center; gap: 0.4rem;
  padding: 0.7rem 1.2rem; border-radius: var(--radius-md); border: var(--border-alpha);
  background: var(--color-surface); color: var(--color-text); font-weight: 600; min-height: 44px;
  transition: var(--transition);
}
.btn-ghost:hover { background: var(--color-surface-2); }

/* ===================== HOME ===================== */
.hero { margin-bottom: 1.8rem; }
.hero h1 { font-family: var(--font-display); font-size: var(--fs-2xl); font-weight: 400; line-height: 1.05; }
.hero p { color: var(--color-text-muted); margin-top: 0.3rem; font-size: var(--fs-lg); }
.hero .date { font-size: var(--fs-sm); color: var(--color-text-muted); margin-top: 0.6rem; text-transform: capitalize; }
.card-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 0.9rem; }
@media (min-width: 620px) { .card-grid { grid-template-columns: repeat(3, 1fr); } }
@media (min-width: 900px) { .card-grid { grid-template-columns: repeat(4, 1fr); } }
.game-card {
  position: relative; display: flex; flex-direction: column; gap: 0.5rem;
  background: var(--color-surface); border: var(--border-alpha);
  border-radius: var(--radius-lg); padding: 1rem; box-shadow: var(--shadow-sm);
  transition: var(--transition); text-decoration: none; color: inherit;
}
.game-card:hover { box-shadow: var(--shadow-md); transform: translateY(-2px); }
.game-card .emoji { font-size: 1.8rem; line-height: 1; }
.game-card h3 { font-family: var(--font-display); font-size: var(--fs-lg); font-weight: 400; }
.game-card p { font-size: var(--fs-xs); color: var(--color-text-muted); flex: 1; line-height: 1.45; }
.game-card .meta { display: flex; align-items: center; justify-content: space-between; gap: 0.4rem; margin-top: 0.3rem; }
.badge { display: inline-flex; align-items: center; gap: 0.25rem; font-size: var(--fs-xs); font-weight: 600; padding: 0.2rem 0.5rem; border-radius: 999px; }
.badge.facile { background: oklch(from var(--color-success) l c h / 0.14); color: var(--color-success); }
.badge.medio { background: oklch(from var(--color-warning) l c h / 0.16); color: var(--color-warning); }
.badge.difficile { background: oklch(from var(--color-error) l c h / 0.14); color: var(--color-error); }
.badge.done { background: oklch(from var(--color-success) l c h / 0.16); color: var(--color-success); position: absolute; top: 0.7rem; right: 0.7rem; }
.streak { font-size: var(--fs-xs); color: var(--color-text-muted); font-weight: 600; }
.card-cta { margin-top: 0.3rem; font-size: var(--fs-sm); font-weight: 600; color: var(--color-primary); }

/* ===================== WORDLE / PAROLE ===================== */
.board-center { display: flex; flex-direction: column; align-items: center; gap: 1rem; }
.wordle-grid { display: grid; gap: 5px; margin: 0 auto; }
.wordle-grid .row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; }
.tile {
  width: 56px; height: 56px; display: grid; place-items: center;
  font-size: 1.7rem; font-weight: 700; text-transform: uppercase;
  border: 2px solid var(--color-border); border-radius: var(--radius-sm);
  color: var(--color-text); background: var(--color-surface); user-select: none;
}
.tile.filled { border-color: var(--color-text-muted); animation: pop 0.1s ease; }
@keyframes pop { 0% { transform: scale(0.9); } 100% { transform: scale(1); } }
.tile.flip { animation: flip 0.5s ease forwards; }
@keyframes flip {
  0% { transform: rotateX(0); }
  50% { transform: rotateX(90deg); }
  100% { transform: rotateX(0); }
}
.tile.correct { background: var(--color-correct); border-color: var(--color-correct); color: #fff; }
.tile.present { background: var(--color-present); border-color: var(--color-present); color: #fff; }
.tile.absent { background: var(--color-absent); border-color: var(--color-absent); color: #fff; }
.row.shake { animation: shake 0.5s ease; }
@keyframes shake { 0%,100%{transform:translateX(0);} 20%{transform:translateX(-6px);} 40%{transform:translateX(6px);} 60%{transform:translateX(-4px);} 80%{transform:translateX(4px);} }
.keyboard { display: flex; flex-direction: column; gap: 6px; width: 100%; max-width: 500px; }
.kb-row { display: flex; gap: 5px; justify-content: center; }
.key {
  min-width: 30px; height: 52px; flex: 1; max-width: 44px;
  display: grid; place-items: center; border-radius: var(--radius-sm);
  background: var(--color-surface-2); font-weight: 700; font-size: 0.85rem;
  text-transform: uppercase; transition: var(--transition); user-select: none;
}
.key:hover { filter: brightness(0.95); }
.key.wide { flex: 1.5; max-width: 66px; font-size: 0.7rem; }
.key.correct { background: var(--color-correct); color: #fff; }
.key.present { background: var(--color-present); color: #fff; }
.key.absent { background: var(--color-absent); color: #fff; }
/* color-blind patterns */
[data-cb="on"] .tile.correct::after, [data-cb="on"] .key.correct::after { content:"●"; position:absolute; font-size:9px; transform:translate(14px,-16px); }
[data-cb="on"] .tile.present::after, [data-cb="on"] .key.present::after { content:"▲"; position:absolute; font-size:9px; transform:translate(14px,-16px); }
[data-cb="on"] .tile { position: relative; }
[data-cb="on"] .key { position: relative; }

/* ===================== CRUCIVERBA ===================== */
.cw-layout { display: grid; gap: 1.5rem; grid-template-columns: 1fr; align-items: start; }
@media (min-width: 760px) { .cw-layout { grid-template-columns: auto 1fr; } }
.cw-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 2px; background: var(--color-text); padding: 2px; border-radius: var(--radius-sm); width: min(320px, 90vw); }
.cw-cell { position: relative; aspect-ratio: 1; background: var(--color-surface); display: grid; place-items: center; }
.cw-cell.block { background: var(--color-text); }
.cw-cell input {
  width: 100%; height: 100%; border: none; text-align: center; text-transform: uppercase;
  font-size: clamp(1rem, 5vw, 1.5rem); font-weight: 700; background: transparent; color: var(--color-text);
}
.cw-cell input:focus { outline: none; }
.cw-cell.active-word { background: oklch(from var(--color-primary) l c h / 0.18); }
.cw-cell.active-cell { background: oklch(from var(--color-primary) l c h / 0.4); }
.cw-cell.cw-correct input { color: var(--color-success); }
.cw-cell.cw-wrong { background: oklch(from var(--color-error) l c h / 0.3); }
.cw-num { position: absolute; top: 1px; left: 2px; font-size: 9px; font-weight: 700; color: var(--color-text-muted); pointer-events: none; }
.cw-clues { display: grid; gap: 1.2rem; }
.cw-clues h4 { font-family: var(--font-display); font-size: var(--fs-lg); margin-bottom: 0.4rem; font-weight: 400; }
.cw-clue { padding: 0.4rem 0.6rem; border-radius: var(--radius-sm); font-size: var(--fs-sm); cursor: pointer; transition: var(--transition); display: flex; gap: 0.5rem; }
.cw-clue:hover { background: var(--color-surface-2); }
.cw-clue.active { background: oklch(from var(--color-primary) l c h / 0.16); font-weight: 500; }
.cw-clue b { color: var(--color-primary); }

/* ===================== GENERIC GRID GAMES (LinkedIn-style) ===================== */
.board-card {
  background: var(--color-surface); padding: 0; border-radius: 14px;
  box-shadow: var(--shadow-md); border: var(--border-alpha);
  width: fit-content; max-width: 96vw; margin: 0 auto; overflow: hidden;
}
.grid-board { display: grid; gap: 0; margin: 0 auto; width: min(420px, 92vw); user-select: none; touch-action: none; }
.gc {
  aspect-ratio: 1; display: grid; place-items: center; position: relative;
  background: var(--color-surface); font-size: clamp(1.1rem, 6vw, 1.7rem);
  transition: background var(--transition), box-shadow var(--transition);
}
.gc.conflict { background: oklch(from var(--color-error) l c h / 0.28) !important; }
.stat-row { display: flex; gap: 1.2rem; margin-bottom: 1rem; font-size: var(--fs-sm); color: var(--color-text-muted); flex-wrap: wrap; }
.stat-row b { color: var(--color-text); font-variant-numeric: tabular-nums; }

/* TANGO */
.tango-grid { box-shadow: inset 0 0 0 2px oklch(from var(--color-text) l c h / 0.85); border-radius: 12px; }
.tango-grid .gc { border: 1px solid oklch(from var(--color-text) l c h / 0.22); background: var(--color-surface-2); cursor: pointer; }
.tango-grid .gc.fixed { background: oklch(from var(--color-primary) l c h / 0.07); }
.tango-sym { font-size: clamp(1.3rem, 7vw, 2rem); line-height: 1; transition: transform var(--transition); }
.tango-sym.pop { animation: pop 0.16s ease; }
.tango-eq, .tango-x { position: absolute; font-size: 0.74rem; font-weight: 800; z-index: 3; background: var(--color-surface); color: var(--color-text); padding: 0 2px; border-radius: 4px; box-shadow: var(--shadow-sm); }

/* QUEEN */
.queen-grid { box-shadow: 0 0 0 3px oklch(from var(--color-text) l c h / 0.9); border-radius: 10px; }
.queen-cell { border: 1px solid oklch(from var(--color-text) l c h / 0.32); cursor: pointer; }
.queen-cell .q-x { color: oklch(from var(--color-text) l c h / 0.5); font-size: 0.55em; font-weight: 700; }
.queen-cell .q-crown { font-size: 0.86em; line-height: 1; color: #1a1a1a; filter: drop-shadow(0 1px 1px rgba(0,0,0,0.35)); animation: pop 0.18s ease; }
.queen-cell.bad { box-shadow: inset 0 0 0 3px var(--color-error); z-index: 4; }
.queen-cell.bad .q-crown { color: var(--color-error); }

/* ZIP */
.zip-wrap {
  position: relative; width: min(440px, 92vw); margin: 0 auto; padding: 10px;
  background: var(--color-surface); border-radius: 14px; box-shadow: var(--shadow-md); border: var(--border-alpha);
}
.zip-svg { position: absolute; inset: 10px; pointer-events: none; width: calc(100% - 20px); height: calc(100% - 20px); z-index: 1; }
.zip-board { position: relative; z-index: 2; box-shadow: inset 0 0 0 2px oklch(from var(--color-text) l c h / 0.15); border-radius: 8px; overflow: hidden; }
.zip-board .gc { border: 1px solid oklch(from var(--color-text) l c h / 0.13); cursor: pointer; background: transparent; }
.zip-num {
  width: 74%; height: 74%; border-radius: 50%; z-index: 3; position: relative;
  background: var(--color-text); color: var(--color-surface);
  display: grid; place-items: center; font-weight: 800;
  font-size: clamp(0.85rem, 4.4vw, 1.15rem); box-shadow: var(--shadow-sm);
}
.gc.zip-on { background: oklch(from var(--color-primary) l c h / 0.14); }
.gc.zip-next::after { content: ''; position: absolute; width: 24%; height: 24%; border-radius: 50%; background: oklch(from var(--color-primary) l c h / 0.5); z-index: 2; }

/* PATCHES */
.patch-layout { display: grid; gap: 1.4rem; grid-template-columns: 1fr; align-items: start; justify-items: center; }
@media (min-width: 720px){ .patch-layout { grid-template-columns: auto auto; justify-items: start; } }
.patch-board { box-shadow: inset 0 0 0 2px oklch(from var(--color-text) l c h / 0.12); border-radius: 10px; }
.patch-board .gc { border-radius: 7px; }
.tray { display: flex; flex-wrap: wrap; gap: 0.9rem; align-content: flex-start; max-width: 340px; padding: 0.4rem; }
.piece { display: grid; gap: 0; padding: 0; border-radius: 9px; cursor: grab; background: transparent; transition: transform var(--transition); }
.piece:hover { transform: translateY(-2px); }
.piece.used { opacity: 0.25; pointer-events: none; }
.piece.sel { outline: 3px solid var(--color-primary); outline-offset: 3px; border-radius: 11px; }
.pcell { width: clamp(24px, 7vw, 32px); height: clamp(24px, 7vw, 32px); border-radius: 7px; }
.pcell:not(.empty) { box-shadow: inset 0 -3px 0 rgba(0,0,0,0.14), inset 0 3px 0 rgba(255,255,255,0.4); }
.pcell.empty { background: transparent !important; box-shadow: none; }

/* ===================== AUTH / LOGIN ===================== */
#loginOverlay {
  position: fixed; inset: 0; z-index: 300; display: none;
  place-items: center; padding: 1rem;
  background: linear-gradient(160deg, var(--color-bg), var(--color-surface-2));
}
#loginOverlay.open { display: grid; }
.login-card {
  background: var(--color-surface); border: var(--border-alpha); border-radius: var(--radius-lg);
  box-shadow: var(--shadow-lg); padding: 1.8rem 1.6rem; width: 100%; max-width: 380px;
}
.login-card .login-logo { font-family: var(--font-display); font-size: var(--fs-2xl); line-height: 1; }
.login-card .login-logo b { color: var(--color-primary); font-weight: 400; }
.login-card p.sub { color: var(--color-text-muted); font-size: var(--fs-sm); margin: 0.3rem 0 1.2rem; }
.field { display: flex; flex-direction: column; gap: 0.25rem; margin-bottom: 0.8rem; }
.field label { font-size: var(--fs-xs); font-weight: 600; color: var(--color-text-muted); text-transform: uppercase; letter-spacing: 0.4px; }
.field input {
  font-family: inherit; font-size: var(--fs-base); padding: 0.65rem 0.8rem;
  border-radius: var(--radius-md); border: 1.5px solid var(--color-border);
  background: var(--color-surface); color: var(--color-text); transition: var(--transition);
}
.field input:focus { outline: none; border-color: var(--color-primary); box-shadow: 0 0 0 3px oklch(from var(--color-primary) l c h / 0.18); }
.login-err { color: var(--color-error); font-size: var(--fs-sm); min-height: 1.2em; margin-bottom: 0.4rem; }
.login-switch { text-align: center; font-size: var(--fs-sm); color: var(--color-text-muted); margin-top: 1rem; }
.login-switch button { color: var(--color-primary); font-weight: 600; text-decoration: underline; }
.user-chip {
  display: inline-flex; align-items: center; gap: 0.4rem; padding: 0.35rem 0.6rem;
  border-radius: 999px; background: var(--color-surface-2); font-size: var(--fs-sm); font-weight: 600;
  border: var(--border-alpha); flex-shrink: 0;
}
.user-chip .avatar {
  width: 26px; height: 26px; border-radius: 50%; display: grid; place-items: center;
  background: var(--color-primary); color: #fff; font-size: 0.7rem; font-weight: 700;
}
.user-chip .avatar.guest { background: var(--color-text-muted); }

/* ===================== CLASSIFICA / LEADERBOARD ===================== */
.lb-tabs { display: flex; gap: 0.4rem; flex-wrap: wrap; margin-bottom: 1.2rem; }
.lb-tabs button {
  padding: 0.5rem 0.9rem; border-radius: 999px; font-size: var(--fs-sm); font-weight: 600;
  background: var(--color-surface); border: var(--border-alpha); color: var(--color-text-muted); transition: var(--transition);
}
.lb-tabs button.active { background: var(--color-primary); color: #fff; border-color: transparent; }
.lb-list { display: flex; flex-direction: column; gap: 0.5rem; max-width: 560px; }
.lb-row {
  display: grid; grid-template-columns: 38px 1fr auto; align-items: center; gap: 0.8rem;
  background: var(--color-surface); border: var(--border-alpha); border-radius: var(--radius-md);
  padding: 0.7rem 0.9rem; box-shadow: var(--shadow-sm);
}
.lb-row.me { border-color: var(--color-primary); box-shadow: 0 0 0 2px oklch(from var(--color-primary) l c h / 0.25); }
.lb-rank { font-family: var(--font-display); font-size: var(--fs-lg); text-align: center; }
.lb-rank.gold { color: var(--color-gold); } .lb-rank.silver { color: #9ca3af; } .lb-rank.bronze { color: #b45309; }
.lb-name { font-weight: 600; }
.lb-name small { display: block; font-weight: 400; font-size: var(--fs-xs); color: var(--color-text-muted); }
.lb-time { font-variant-numeric: tabular-nums; font-weight: 700; color: var(--color-primary); font-size: var(--fs-lg); }
.lb-empty { color: var(--color-text-muted); font-size: var(--fs-sm); padding: 1.5rem 0; }

/* ===================== MEMORIA ===================== */
.mem-grid { display: grid; gap: 8px; margin: 0 auto; width: min(440px, 94vw); }
.mem-card { aspect-ratio: 3/4; perspective: 600px; cursor: pointer; }
.mem-inner { position: relative; width: 100%; height: 100%; transition: transform 0.4s; transform-style: preserve-3d; }
.mem-card.flipped .mem-inner, .mem-card.matched .mem-inner { transform: rotateY(180deg); }
.mem-face { position: absolute; inset: 0; backface-visibility: hidden; border-radius: var(--radius-md); display: grid; place-items: center; font-size: clamp(1.4rem, 7vw, 2rem); border: var(--border-alpha); }
.mem-front { background: var(--color-primary); color: #fff; font-family: var(--font-display); }
.mem-back { background: var(--color-surface); transform: rotateY(180deg); flex-direction: column; }
.mem-card.matched .mem-back { background: oklch(from var(--color-success) l c h / 0.18); border-color: var(--color-success); }
.mem-back small { font-size: 0.6rem; color: var(--color-text-muted); margin-top: 2px; }

/* ===================== ANAGRAMMA ===================== */
.ana-wrap { max-width: 460px; }
.ana-slots, .ana-pool { display: flex; flex-wrap: wrap; gap: 6px; margin: 1rem 0; min-height: 56px; }
.ana-slots { padding: 8px; border: 2px dashed var(--color-border); border-radius: var(--radius-md); }
.ana-tile {
  width: 46px; height: 52px; display: grid; place-items: center; border-radius: var(--radius-sm);
  background: var(--color-surface); border: var(--border-alpha); box-shadow: var(--shadow-sm);
  font-weight: 700; font-size: 1.3rem; text-transform: uppercase; transition: var(--transition);
}
.ana-tile:hover { background: var(--color-surface-2); }
.ana-tile.placed { background: var(--color-primary); color: #fff; }

/* ===================== MODAL ===================== */
.modal-overlay {
  position: fixed; inset: 0; background: oklch(from #000 l c h / 0.5); z-index: 100;
  display: grid; place-items: center; padding: 1rem; opacity: 0; pointer-events: none; transition: opacity 0.2s;
}
.modal-overlay.open { opacity: 1; pointer-events: auto; }
.modal {
  background: var(--color-surface); border-radius: var(--radius-lg); padding: 1.6rem;
  max-width: 420px; width: 100%; box-shadow: var(--shadow-lg); transform: scale(0.94);
  transition: transform 0.25s cubic-bezier(0.16,1,0.3,1); max-height: 90vh; overflow-y: auto;
}
.modal-overlay.open .modal { transform: scale(1); }
.modal h2 { font-family: var(--font-display); font-size: var(--fs-xl); font-weight: 400; margin-bottom: 0.5rem; }
.modal p { color: var(--color-text-muted); margin-bottom: 1rem; }
.modal .modal-close { position: absolute; }
.modal-actions { display: flex; gap: 0.6rem; margin-top: 1.2rem; flex-wrap: wrap; }
.modal-actions button { flex: 1; min-width: 120px; }
.countdown { font-variant-numeric: tabular-nums; font-weight: 700; color: var(--color-primary); }
/* stats */
.stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0.5rem; text-align: center; margin: 1rem 0; }
.stats-grid .num { font-size: var(--fs-xl); font-weight: 800; font-variant-numeric: tabular-nums; }
.stats-grid .lbl { font-size: 10px; color: var(--color-text-muted); text-transform: uppercase; letter-spacing: 0.3px; }
.dist-row { display: flex; align-items: center; gap: 0.5rem; margin: 3px 0; font-size: var(--fs-sm); }
.dist-bar { background: var(--color-absent); color: #fff; padding: 2px 6px; border-radius: var(--radius-sm); font-weight: 700; min-width: 24px; text-align: right; }
.dist-bar.hl { background: var(--color-correct); }

/* ===================== TOAST ===================== */
#toast {
  position: fixed; left: 50%; bottom: 80px; transform: translateX(-50%) translateY(20px);
  background: var(--color-text); color: var(--color-bg); padding: 0.7rem 1.2rem; border-radius: var(--radius-md);
  font-weight: 600; font-size: var(--fs-sm); z-index: 200; opacity: 0; pointer-events: none; transition: all 0.25s; box-shadow: var(--shadow-lg);
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ===================== FOOTER ===================== */
footer { text-align: center; padding: 2rem 1rem; color: var(--color-text-muted); font-size: var(--fs-sm); border-top: var(--border-alpha); margin-top: 2rem; }

#confetti { position: fixed; inset: 0; pointer-events: none; z-index: 150; }

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { animation-duration: 0.001ms !important; transition-duration: 0.001ms !important; }
}
.help-list { font-size: var(--fs-sm); color: var(--color-text-muted); line-height: 1.6; padding-left: 1.1rem; }
.help-list li { margin-bottom: 0.3rem; }

/* ================================================================
   NINTENDO PREMIUM v4 — Bianco · Futura · Giocoso · Animato
   ================================================================ */

/* ── Token overrides ─────────────────────────────────────────── */
:root {
  --color-bg: #0d0d10;
  --color-surface: #17181c;
  --color-surface-2: #22242a;
  --color-border: rgba(255,255,255,.09);
  --color-text: #f0f0f0;
  --color-text-muted: #888;
  --color-primary: #3b82f6;
  --color-primary-hover: #2563eb;
  --color-success: #22c55e;
  --color-error: #f87171;
  --color-warning: #fbbf24;

  --font-body: "Jost","Futura","Avenir Next","Century Gothic",system-ui,sans-serif;
  --font-display: "Jost","Futura","Avenir Next","Century Gothic",system-ui,sans-serif;

  --radius-sm: 8px; --radius-md: 14px; --radius-lg: 20px; --radius-xl: 28px;
  --transition: 200ms cubic-bezier(.22,1,.36,1);
  --spring: 460ms cubic-bezier(.34,1.56,.64,1);

  --shadow-sm: 0 1px 3px rgba(0,0,0,.05), 0 4px 10px rgba(0,0,0,.06);
  --shadow-md: 0 2px 5px rgba(0,0,0,.05), 0 12px 28px rgba(0,0,0,.09);
  --shadow-lg: 0 4px 8px rgba(0,0,0,.06), 0 24px 52px rgba(0,0,0,.13);
  --border-alpha: 1.5px solid rgba(0,0,0,0.08);
  --page-accent: #2855e0;
  --accent: #2855e0;
}
/* dark-only — no overrides needed */

/* ── Global body ─────────────────────────────────────────────── */
body {
  font-family: var(--font-body);
  letter-spacing: -0.012em;
  background:
    radial-gradient(ellipse 900px 340px at 65% -100px,
      color-mix(in srgb, var(--page-accent) 10%, transparent), transparent),
    var(--color-bg);
  background-attachment: fixed;
  transition: background .55s ease, color var(--transition);
  -webkit-font-smoothing: antialiased;
}
main { max-width: 1120px; padding: 2rem 1.2rem 5rem; overflow-x: clip; }

/* ── Header ──────────────────────────────────────────────────── */
header {
  position: sticky; top: 0; z-index: 50;
  background: rgba(249,249,247,0.88);
  -webkit-backdrop-filter: blur(24px) saturate(180%);
  backdrop-filter: blur(24px) saturate(180%);
  border-bottom: 1.5px solid rgba(0,0,0,0.07);
  box-shadow: none;
}
[data-theme="dark"] header { background: rgba(12,12,14,0.92); border-bottom-color: rgba(255,255,255,0.08); }
.header-inner { max-width: 1120px; padding: 0.7rem 1.2rem; gap: 1rem; }
.logo {
  font-family: var(--font-display); font-weight: 900; font-size: 1.28rem;
  letter-spacing: -0.05em; text-decoration: none; color: var(--color-text);
}
.logo b { color: var(--color-primary); font-weight: 900;
  background: none; -webkit-text-fill-color: var(--color-primary); }
nav.tabs { gap: 0.18rem; }
nav.tabs a {
  padding: 0.4rem 0.78rem; border-radius: 10px; font-weight: 600;
  font-size: 0.83rem; letter-spacing: -0.01em; color: var(--color-text-muted);
  text-decoration: none; transition: var(--transition);
}
nav.tabs a:hover { background: var(--color-surface-2); color: var(--color-text); }
nav.tabs a.active {
  background: var(--color-text); color: var(--color-surface);
  box-shadow: none; animation: tabPop .22s ease;
}
@keyframes tabPop { from { transform: scale(.9); } to { transform: scale(1); } }
.icon-btn { border-radius: 11px; width: 38px; height: 38px; }
.icon-btn:hover { background: var(--color-surface-2); }
.icon-btn.active { background: var(--color-text); color: var(--color-surface); }
.user-chip {
  border-radius: 999px; font-weight: 700; font-size: 0.8rem;
  box-shadow: none; padding: 0.3rem 0.65rem 0.3rem 0.32rem;
}
.user-chip .avatar { box-shadow: none; }

/* ── Hero ────────────────────────────────────────────────────── */
.hero { margin-bottom: 2.2rem; }
.eyebrow {
  display: inline-flex; align-items: center; gap: 0.4rem; margin-bottom: 0.9rem;
  padding: 0.28rem 0.85rem; border-radius: 999px;
  background: color-mix(in srgb, var(--color-primary) 10%, transparent);
  color: var(--color-primary);
  border: 1.5px solid color-mix(in srgb, var(--color-primary) 25%, transparent);
  font-size: 0.7rem; font-weight: 800; letter-spacing: 0.1em; text-transform: uppercase;
  animation: none;
}
.hero h1 {
  font-family: var(--font-display); font-weight: 900;
  font-size: clamp(38px, 4.2vw + 1rem, 66px);
  letter-spacing: -0.05em; line-height: 0.98; color: var(--color-text);
}
.grad {
  color: var(--color-primary);
  background: none; -webkit-text-fill-color: var(--color-primary);
  animation: none; background-size: auto;
}
.hero p { color: var(--color-text-muted); font-size: clamp(16px, 1.05rem, 19px); margin-top: 0.65rem; font-weight: 500; }
.hero .date {
  font-size: 0.75rem; color: var(--color-text-muted); margin-top: 0.55rem;
  font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em;
}

/* ================================================================
   GAME CARDS — "Nintendo box-art" — coloured full-bleed banner
   ================================================================ */
.card-grid { gap: 1rem; display: grid; grid-template-columns: repeat(2,1fr); }
@media (min-width:620px) { .card-grid { grid-template-columns: repeat(3,1fr); } }
@media (min-width:900px) { .card-grid { grid-template-columns: repeat(4,1fr); } }

.game-card {
  position: relative; display: flex; flex-direction: column;
  padding: 0; overflow: hidden; border-radius: 22px;
  background: var(--color-surface);
  border: 2px solid rgba(0,0,0,0.07);
  box-shadow: var(--shadow-md);
  text-decoration: none; color: inherit; gap: 0;
  transition: transform var(--spring), box-shadow var(--transition), border-color var(--transition);
}
.game-card:hover {
  transform: translateY(-9px) scale(1.012);
  box-shadow: 0 20px 52px rgba(0,0,0,.12), 0 4px 12px rgba(0,0,0,.06);
  border-color: color-mix(in srgb, var(--accent,var(--color-primary)) 55%, rgba(0,0,0,.07));
}
.game-card:active { transform: translateY(-2px) scale(.985); }

/* Coloured banner — the whole emoji block is the card "art" */
.game-card .emoji {
  display: flex; align-items: center; justify-content: center;
  width: 100%; height: 108px; font-size: 2.9rem;
  background: var(--accent, var(--color-primary));
  border-radius: 0; box-shadow: none;
  position: relative; overflow: hidden;
  transition: height var(--transition);
}
/* dot-grid texture overlay */
.game-card .emoji::before {
  content: ''; position: absolute; inset: 0; z-index: 0;
  background:
    radial-gradient(circle, rgba(255,255,255,0.22) 1px, transparent 1px);
  background-size: 16px 16px;
}
/* shine sweep on hover */
.game-card .emoji::after {
  content: ''; position: absolute; inset: 0; z-index: 1;
  background: linear-gradient(105deg, transparent 30%, rgba(255,255,255,0.22) 48%, transparent 66%);
  transform: translateX(-100%);
  transition: transform .55s ease;
}
.game-card:hover .emoji::after { transform: translateX(110%); }
.game-card:hover .emoji { height: 118px; }
.game-card .emoji > * { position: relative; z-index: 2; transition: transform var(--spring); }
.game-card:hover .emoji > * { transform: scale(1.15) rotate(-6deg); }
.game-card.is-done .emoji { filter: saturate(.45) brightness(.9); }

/* text section */
.game-card h3 {
  font-family: var(--font-display); font-weight: 800; font-size: 1.04rem;
  letter-spacing: -0.025em; padding: 0.72rem 0.9rem 0.12rem; color: var(--color-text);
}
.game-card p {
  font-size: 0.77rem; color: var(--color-text-muted); line-height: 1.5;
  padding: 0 0.9rem; font-weight: 500; flex: 1;
}
.game-card .meta {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0.48rem 0.9rem; gap: 0.4rem;
}
.game-card .card-cta {
  font-size: 0.77rem; font-weight: 800; letter-spacing: 0.01em;
  color: var(--accent, var(--color-primary));
  padding: 0 0.9rem 0.72rem;
  display: inline-flex; align-items: center; gap: 0.3rem;
  transition: gap var(--transition);
}
.game-card:hover .card-cta { gap: 0.6rem; }

/* done badge — floats over the banner */
.game-card .badge.done {
  position: absolute; top: 0.55rem; right: 0.55rem;
  background: rgba(255,255,255,.92); color: var(--color-success); border-radius: 999px;
  font-size: 0.65rem; font-weight: 800; z-index: 10; backdrop-filter: blur(6px);
}
/* card entrance stagger */
.card-grid .game-card {
  opacity: 0;
  animation: cardRise .6s cubic-bezier(.22,1,.36,1) forwards;
  animation-delay: calc(var(--i,0)*55ms);
}
@keyframes cardRise { from{opacity:0;transform:translateY(30px) scale(.93);} to{opacity:1;transform:none;} }

/* ================================================================
   GAME HEADER + BACK BUTTON
   ================================================================ */
.game-head {
  display: flex; align-items: flex-start; justify-content: space-between;
  gap: 1rem; margin-bottom: 1.8rem; flex-wrap: wrap;
}
.gh-main { display: flex; flex-direction: column; gap: 0.1rem; min-width: 0; }
.gh-back {
  display: inline-flex; align-items: center; gap: 0.28rem; align-self: flex-start;
  margin-bottom: 0.72rem; padding: 0.38rem 0.88rem 0.38rem 0.62rem;
  border-radius: 999px; background: var(--color-surface);
  border: 1.5px solid rgba(0,0,0,0.09); box-shadow: var(--shadow-sm);
  color: var(--color-text-muted); font-size: 0.76rem; font-weight: 700;
  text-decoration: none; letter-spacing: 0.02em; transition: var(--transition);
}
.gh-back:hover {
  transform: translateX(-2px); color: var(--accent,var(--color-primary));
  border-color: color-mix(in srgb, var(--accent,var(--color-primary)) 50%, rgba(0,0,0,.09));
}
.gh-back svg { transition: transform var(--transition); }
.gh-back:hover svg { transform: translateX(-2px); }
.game-head h1 {
  font-family: var(--font-display); font-weight: 900;
  letter-spacing: -0.045em; font-size: clamp(28px,2.6vw + 1rem,46px);
  line-height: 1.0; color: var(--color-text);
}
.game-head p { color: var(--color-text-muted); font-size: 0.88rem; font-weight: 500; margin-top: 0.22rem; }
.game-head .actions { display: flex; gap: 0.4rem; flex-shrink: 0; }

/* ── Buttons ──────────────────────────────────────────────────── */
.btn-primary {
  background: var(--page-accent,var(--color-primary));
  border-radius: 13px; font-weight: 800; font-family: var(--font-display);
  letter-spacing: -0.01em;
  box-shadow: 0 6px 20px -8px color-mix(in srgb, var(--page-accent,var(--color-primary)) 80%, transparent);
  transition: transform var(--transition), filter var(--transition), box-shadow var(--transition);
  position: relative; overflow: hidden;
}
.btn-primary::after {
  content: ''; position: absolute; top: 0; left: -80%; width: 50%; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,.3), transparent);
  transform: skewX(-18deg); transition: left .5s ease;
}
.btn-primary:hover { transform: translateY(-2px); filter: brightness(1.08); }
.btn-primary:hover::after { left: 150%; }
.btn-primary:active { transform: translateY(0) scale(.97); }
.btn-ghost {
  border-radius: 13px; font-weight: 700;
  border: 1.5px solid rgba(0,0,0,0.09); transition: var(--transition);
}
.btn-ghost:hover { background: var(--color-surface-2); }
.chip-btn {
  border-radius: 10px; font-weight: 700; font-size: 0.8rem;
  border: 1.5px solid rgba(0,0,0,0.09); background: var(--color-surface);
  box-shadow: none; transition: var(--transition);
}
.chip-btn:hover { background: var(--color-surface-2); transform: translateY(-1px); }
.chip-btn.toggle.on { background: var(--page-accent,var(--color-primary)); color: #fff; border-color: transparent; }

/* ── Badges ───────────────────────────────────────────────────── */
.badge { font-weight: 800; letter-spacing: 0.02em; font-size: 0.66rem; }
.badge.facile   { background: #dcfce7; color: #15803d; }
.badge.medio    { background: #fef3c7; color: #92400e; }
.badge.difficile{ background: #fee2e2; color: #b91c1c; }
[data-theme="dark"] .badge.facile   { background: rgba(22,163,74,.22); color: #4ade80; }
[data-theme="dark"] .badge.medio    { background: rgba(245,158,11,.22); color: #fbbf24; }
[data-theme="dark"] .badge.difficile{ background: rgba(220,38,38,.22);  color: #f87171; }

/* ── Boards & surfaces ────────────────────────────────────────── */
.board-card {
  background: var(--color-surface); border-radius: 18px;
  border: 1.5px solid rgba(0,0,0,0.07); box-shadow: var(--shadow-md);
}
.zip-wrap {
  background: var(--color-surface); border-radius: 20px;
  border: 1.5px solid rgba(0,0,0,0.07); box-shadow: var(--shadow-md);
}

/* ── Modal & Toast ────────────────────────────────────────────── */
.modal-overlay {
  background: rgba(0,0,0,.44);
  -webkit-backdrop-filter: blur(8px); backdrop-filter: blur(8px);
}
.modal {
  border-radius: 26px; box-shadow: 0 32px 80px rgba(0,0,0,.18);
  border: 1.5px solid rgba(255,255,255,.12);
}
.modal h2 { font-family: var(--font-display); font-weight: 900; letter-spacing: -0.035em; }
#toast {
  border-radius: 999px; padding: 0.72rem 1.45rem; font-weight: 700;
  font-family: var(--font-display); letter-spacing: -0.01em;
  box-shadow: 0 8px 28px rgba(0,0,0,.18);
}

/* ── Locked screen ────────────────────────────────────────────── */
.locked-view-wrap {
  min-height: 70vh;
  display: flex; align-items: center; justify-content: center;
  padding: 2rem 1rem;
  background:
    radial-gradient(ellipse 70% 60% at 50% 0%, color-mix(in srgb, var(--page-accent) 18%, transparent), transparent),
    var(--color-bg);
}
.locked-card {
  max-width: 460px; width: 100%;
  background: var(--color-surface);
  border: 1.5px solid rgba(0,0,0,0.08); border-radius: 28px;
  padding: 2.4rem 2rem 2rem;
  text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,.14), 0 4px 12px rgba(0,0,0,.08);
  animation: popUp .45s cubic-bezier(.22,1,.36,1);
  position: relative; overflow: hidden;
}
.locked-card::before {
  content:''; position:absolute; top:0; left:0; right:0; height:5px;
  background: linear-gradient(90deg, var(--page-accent), color-mix(in srgb, var(--page-accent) 60%, #fff));
}
[data-theme="dark"] .locked-card { background: #1a1d24; border-color: rgba(255,255,255,.1); }
.locked-emoji {
  width: 88px; height: 88px; margin: 0 auto 1.2rem; border-radius: 24px;
  font-size: 2.7rem; display: flex; align-items: center; justify-content: center;
  background: color-mix(in srgb, var(--page-accent) 14%, var(--color-surface-2));
  box-shadow: 0 8px 24px -12px color-mix(in srgb, var(--page-accent) 60%, transparent);
  animation: floatY 3.2s ease-in-out infinite;
}
.locked-card h1 {
  font-family: var(--font-display); font-weight: 900; letter-spacing: -0.035em;
  font-size: clamp(22px,2vw + 1rem,30px); color: var(--color-text); line-height: 1.15; margin-bottom: .4rem;
}
.locked-card h1 .grad {
  color: var(--page-accent) !important;
  background: none !important; -webkit-text-fill-color: var(--page-accent) !important;
}
.locked-sub { color: var(--color-text-muted); font-size: .9rem; font-weight: 500; max-width: 32ch; margin: 0 auto .8rem; line-height: 1.55; }
.locked-stat {
  margin: 1.2rem auto 0; padding: 1rem 1.2rem; border-radius: 16px;
  background: var(--color-surface-2); max-width: 300px;
  border: 1px solid rgba(0,0,0,.07);
}
.locked-stat-lbl { font-size: .7rem; text-transform: uppercase; letter-spacing: .08em; color: var(--color-text-muted); font-weight: 700; margin-bottom: .3rem; }
.locked-time { font-family: var(--font-display); font-size: clamp(2rem,6vw,2.8rem); color: var(--page-accent); font-weight: 900; line-height: 1; letter-spacing: -.04em; }
.locked-rank { font-size: .78rem; color: var(--color-text-muted); font-weight: 600; margin-top: .25rem; }
.locked-countdown { margin-top: .9rem; font-size: .82rem; color: var(--color-text-muted); }
.locked-countdown .countdown { color: var(--page-accent); font-weight: 800; font-variant-numeric: tabular-nums; }

/* ── Login ────────────────────────────────────────────────────── */
#loginOverlay {
  background:
    radial-gradient(820px 520px at 50% -80px,
      color-mix(in srgb, var(--color-primary) 13%, transparent), transparent 70%),
    var(--color-bg);
}
.login-card {
  border-radius: 24px; box-shadow: var(--shadow-lg);
  border: 1.5px solid rgba(0,0,0,0.08);
}
.login-card .login-logo { font-family: var(--font-display); font-weight: 900; letter-spacing: -0.04em; }
.login-card .login-logo b { color: var(--color-primary); background: none; -webkit-text-fill-color: var(--color-primary); }
.login-card::before { display: none; }
.field input:focus {
  border-color: var(--color-primary);
  box-shadow: 0 0 0 4px color-mix(in srgb, var(--color-primary) 14%, transparent);
}

/* ── Leaderboard ──────────────────────────────────────────────── */
.lb-tabs button { border-radius: 999px; font-weight: 700; font-size: 0.8rem; }
.lb-tabs button.active { background: var(--color-text); color: var(--color-surface); border-color: transparent; }
.lb-row {
  border-radius: 15px; border: 1.5px solid rgba(0,0,0,0.07);
  box-shadow: none; transition: transform var(--transition), background var(--transition);
}
.lb-row:hover { transform: translateX(4px); background: var(--color-surface-2); box-shadow: none; }
.lb-row.me {
  border-color: var(--color-primary);
  background: color-mix(in srgb, var(--color-primary) 6%, var(--color-surface));
}
.lb-time { color: var(--color-primary); font-family: var(--font-display); font-weight: 900; }
.lb-rank { font-family: var(--font-display); font-weight: 900; }
footer { background: none; }

/* ================================================================
   PAGE TRANSITIONS — iOS-style directional push
   ================================================================ */
.view { animation: none; }
.view.active { opacity: 1; }
.view.active[data-anim="forward"] { animation: pgFwd .48s cubic-bezier(.22,1,.36,1); }
.view.active[data-anim="back"]    { animation: pgBack .44s cubic-bezier(.22,1,.36,1); }
.view.active[data-anim="cross"]   { animation: pgCross .36s ease; }
@keyframes pgFwd  { from{transform:translateX(30px) scale(.985);} to{transform:none;} }
@keyframes pgBack { from{transform:translateX(-22px) scale(.99);}  to{transform:none;} }
@keyframes pgCross{ from{transform:translateY(10px);}              to{transform:none;} }

/* ================================================================
   BESPOKE PER-GAME DESIGN & ANIMATIONS
   ================================================================ */

/* ── PAROLE (Wordle) — deep blue ─── */
#view-parole { --accent:#2563eb; }
.wordle-grid { gap: 6px; }
.wordle-grid .row { gap: 6px; }
.tile {
  width: 58px; height: 58px; border-radius: 11px;
  font-family: var(--font-display); font-weight: 900; font-size: 1.78rem;
  border: 2.5px solid var(--color-border);
  transition: border-color .1s, transform var(--spring);
}
.tile.filled { border-color: #2563eb; animation: tilePop .2s cubic-bezier(.34,1.56,.64,1); }
@keyframes tilePop { 0%{transform:scale(.8);} 55%{transform:scale(1.12);} 100%{transform:scale(1);} }
.tile.flip { animation: tileFlip .6s ease forwards; }
@keyframes tileFlip { 0%{transform:rotateX(0);} 46%{transform:rotateX(-90deg);} 54%{transform:rotateX(-90deg);} 100%{transform:rotateX(0);} }
.tile.correct { background:#22c55e; border-color:#22c55e; color:#fff; box-shadow:0 6px 16px -8px rgba(34,197,94,.75); }
.tile.present { background:#f59e0b; border-color:#f59e0b; color:#fff; }
.tile.absent  { background:#6b7280; border-color:#6b7280; color:#fff; }
.key {
  height: 54px; border-radius: 10px; font-family: var(--font-display);
  font-weight: 800; font-size: 0.88rem;
  background: var(--color-surface-2); transition: transform .1s, background var(--transition);
}
.key:active { transform: scale(.88); }
.key.correct { background:#22c55e; color:#fff; }
.key.present { background:#f59e0b; color:#fff; }
.key.absent  { background:#9ca3af; color:#fff; }

/* ── CRUCIVERBA — violet ─── */
#view-cruciverba { --accent:#7c3aed; }
.cw-grid { border-radius: 12px; overflow: hidden; gap: 2.5px; box-shadow: 0 16px 40px -24px rgba(124,58,237,.45); }
.cw-cell { border-radius: 0; }
.cw-cell.active-word { background: color-mix(in srgb,#7c3aed 11%,var(--color-surface)); }
.cw-cell.active-cell { background: color-mix(in srgb,#7c3aed 30%,var(--color-surface)); }
.cw-cell.cw-correct { animation: cwPop .28s cubic-bezier(.34,1.56,.64,1); }
@keyframes cwPop { 0%{transform:scale(.62);} 100%{transform:scale(1);} }
.cw-clue.active { background: color-mix(in srgb,#7c3aed 10%,transparent); border-radius: 7px; }
.cw-clue b { color:#7c3aed; }
.cw-clues h4 { font-family: var(--font-display); font-weight: 800; }

/* ── ZIP — cyan; snake drawn by JS ─── */
#view-zip { --accent:#0891b2; }
.zip-wrap { border-radius: 22px; }
.zip-num {
  background: linear-gradient(145deg,#0891b2,#0e7490); color:#fff;
  font-family: var(--font-display); font-weight: 900;
  box-shadow: 0 4px 14px rgba(8,145,178,.45);
}
.gc.zip-on { background: rgba(8,145,178,.16); }
.gc.zip-next::after { background: rgba(8,145,178,.42); animation: zipPulse 1.15s ease-in-out infinite; }
@keyframes zipPulse { 0%,100%{transform:scale(1);opacity:.5;} 50%{transform:scale(1.65);opacity:1;} }
.zip-svg { filter: drop-shadow(0 3px 8px rgba(0,0,0,.14)); }

/* ── TANGO — amber ─── */
#view-tango { --accent:#f59e0b; }
.tango-grid { border-radius: 16px; overflow: hidden; }
.tango-grid .gc { border-color: rgba(245,158,11,.18); }
.tango-grid .gc.fixed { background: rgba(245,158,11,.07); }
.tango-sym { font-size: 1.65rem; transition: transform var(--spring); }
.tango-sym.pop { animation: tangoPop .42s cubic-bezier(.34,1.56,.64,1); }
@keyframes tangoPop { 0%{transform:scale(0) rotate(-55deg);opacity:0;} 65%{transform:scale(1.22) rotate(7deg);} 100%{transform:scale(1) rotate(0);opacity:1;} }
.tango-eq,.tango-x { border-radius: 5px; font-family: var(--font-display); font-weight: 900; }

/* ── QUEEN — magenta ─── */
#view-queen { --accent:#db2777; }
.queen-grid { border-radius: 14px; overflow: hidden; }
.queen-cell .q-crown { animation: crownDrop .42s cubic-bezier(.34,1.56,.64,1); }
@keyframes crownDrop { 0%{transform:translateY(-85%) scale(.3);opacity:0;} 62%{transform:translateY(9%) scale(1.14);} 100%{transform:none;opacity:1;} }
.queen-cell.bad { animation: badShake .38s ease; }
@keyframes badShake { 0%,100%{transform:translateX(0);} 25%{transform:translateX(-4px);} 75%{transform:translateX(4px);} }

/* ── PATCHES — green ─── */
#view-patches { --accent:#16a34a; }
.patch-board { border-radius: 14px; overflow: hidden; }
.patch-board .gc { transition: background var(--spring); }
.piece { transition: transform var(--spring), filter var(--transition); }
.piece:hover { transform: translateY(-4px) rotate(-2deg); }
.piece.sel { outline: 3px solid #16a34a; outline-offset: 4px; border-radius: 12px; animation: pieceSel 1.1s ease-in-out infinite; }
@keyframes pieceSel { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-4px);} }
.pcell:not(.empty) { animation: patchSnap .28s cubic-bezier(.34,1.56,.64,1); }
@keyframes patchSnap { 0%{transform:scale(.72);} 60%{transform:scale(1.08);} 100%{transform:scale(1);} }

/* ── MEMORIA — rose ─── */
#view-memoria { --accent:#e11d48; }
.mem-inner { transition: transform .52s cubic-bezier(.34,1.3,.5,1); }
.mem-front {
  background: linear-gradient(145deg,#e11d48,#9f1239); border-radius: 14px;
  font-family: var(--font-display); font-weight: 900;
}
.mem-face { border-radius: 14px; }
.mem-card.matched .mem-back {
  background: rgba(22,163,74,.12); border-color: #22c55e;
  animation: memMatch .48s cubic-bezier(.34,1.56,.64,1);
}
@keyframes memMatch { 0%{transform:scale(1);} 38%{transform:scale(1.12);} 100%{transform:scale(1);} }
.mem-card:hover:not(.matched) { transform: translateY(-4px); }

/* ── ANAGRAMMA — sky blue ─── */
#view-anagramma { --accent:#0ea5e9; }
.ana-slots {
  border: 2px dashed color-mix(in srgb,#0ea5e9 50%,var(--color-border));
  border-radius: 14px; background: rgba(14,165,233,.04);
}
.ana-tile {
  border-radius: 11px; font-family: var(--font-display); font-weight: 900; font-size: 1.22rem;
  box-shadow: 0 3px 9px rgba(0,0,0,.08);
  transition: transform var(--spring), background var(--transition), box-shadow var(--transition);
}
.ana-tile:hover { transform: translateY(-4px) scale(1.05); }
.ana-tile.placed {
  background: #0ea5e9; color: #fff;
  box-shadow: 0 8px 20px rgba(14,165,233,.45);
  animation: anaPlace .32s cubic-bezier(.34,1.56,.64,1);
}
@keyframes anaPlace { 0%{transform:scale(.62) translateY(-8px);} 100%{transform:scale(1) translateY(0);} }

/* ── SUDOKU — indigo ─── */
#view-sudoku { --accent:#4f46e5; }
.sudoku-grid { display: grid; grid-template-columns: repeat(9, 1fr); width: min(450px, 94vw); border-radius: 10px; overflow: hidden; }
.sud-cell {
  aspect-ratio: 1; display: grid; place-items: center;
  color:#4f46e5; font-family: var(--font-display); font-weight: 700;
  transition: background .1s;
}
.sud-pad { display: flex; flex-wrap: wrap; gap: 0.4rem; justify-content: center; max-width: 450px; margin: 0 auto; }
.sud-cell.given { color: var(--color-text); font-weight: 900; }
.sud-cell.peer  { background: rgba(79,70,229,.06); }
.sud-cell.same  { background: rgba(79,70,229,.15); }
.sud-cell.sel   { background: rgba(79,70,229,.28); animation: cwPop .2s ease; }
.sud-cell.bad   { color:#ef4444; background: rgba(239,68,68,.14); }
.sud-key {
  border-radius: 11px; font-family: var(--font-display); font-weight: 800;
  background: var(--color-surface); border: 1.5px solid rgba(0,0,0,.09);
  transition: var(--transition);
}
.sud-key:hover { background: var(--color-surface-2); transform: translateY(-2px); }

/* ── CAMPO MINATO — orange ─── */
#view-mine { --accent:#ea580c; }
.mine-grid { display: grid; gap: 4px; margin: 0 auto; max-width: min(420px, 94vw); }
.mine-cell {
  aspect-ratio: 1; display: grid; place-items: center;
  border-radius: 8px; font-family: var(--font-display); font-weight: 900;
  background: linear-gradient(145deg, var(--color-surface-2), color-mix(in srgb,#ea580c 8%,var(--color-surface)));
  border: 1px solid rgba(234,88,12,.14);
  box-shadow: inset 0 1px 0 rgba(255,255,255,.55);
  transition: transform .1s, background var(--transition);
}
.mine-cell:not(.open):hover { transform: translateY(-2px); }
.mine-cell.open {
  background: var(--color-surface); box-shadow: inset 0 0 0 1px rgba(0,0,0,.07);
  animation: mineOpen .24s cubic-bezier(.34,1.56,.64,1);
}
@keyframes mineOpen { 0%{transform:scale(.52);opacity:.22;} 100%{transform:scale(1);opacity:1;} }
.mine-cell.flag { background: rgba(245,158,11,.2); animation: tilePop .2s ease; }
.mine-cell.boom { background:#ef4444; animation: mineExplode .5s ease; }
@keyframes mineExplode { 0%{transform:scale(1.6);background:#ef4444;} 30%{transform:translateX(-3px);} 70%{transform:translateX(3px);} 100%{transform:scale(1);} }

/* ── QUINDICI — teal ─── */
#view-quindici { --accent:#0d9488; }
.q15-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; width: min(400px, 92vw); margin: 0 auto; }
.q15-tile {
  aspect-ratio: 1; display: grid; place-items: center;
  font-family: var(--font-display); font-weight: 900; border-radius: 15px;
  background: linear-gradient(145deg,#0d9488,#0f766e); color:#fff;
  box-shadow: inset 0 -4px 0 rgba(0,0,0,.2), 0 6px 18px rgba(13,148,136,.35);
  transition: transform .15s cubic-bezier(.22,1,.36,1), filter var(--transition);
}
.q15-tile:hover:not(.blank) { filter: brightness(1.1); transform: translateY(-3px) scale(1.03); }
.q15-tile.done { background: linear-gradient(145deg,#22c55e,#15803d); box-shadow: inset 0 -4px 0 rgba(0,0,0,.2), 0 6px 18px rgba(34,197,94,.35); }
.q15-tile.blank { background: transparent; box-shadow: none; cursor: default; }

/* ── CONNESSIONI — purple ─── */
#view-connessioni { --accent:#9333ea; }
.conn-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin: 0 auto; max-width: 500px; }
.conn-tile {
  display: grid; place-items: center; min-height: 64px; cursor: pointer;
  border-radius: 13px; font-family: var(--font-display); font-weight: 800;
  font-size: clamp(.62rem,2.2vw,.88rem); letter-spacing: .02em;
  background: var(--color-surface-2); border: 1.5px solid rgba(0,0,0,.07);
  transition: transform .12s, background var(--transition), border-color var(--transition);
}
.conn-tile:hover { transform: translateY(-2px); background: var(--color-surface); }
.conn-tile.sel {
  background:#9333ea; color:#fff; border-color:transparent;
  transform: scale(.95); box-shadow: 0 6px 18px rgba(147,51,234,.42);
}
.conn-band {
  border-radius: 14px; font-family: var(--font-display);
  animation: bandPop .42s cubic-bezier(.34,1.56,.64,1);
}
@keyframes bandPop { 0%{transform:scale(.82);opacity:0;} 60%{transform:scale(1.06);} 100%{transform:scale(1);opacity:1;} }
.conn-band b { font-weight: 900; letter-spacing: .04em; }

/* ── Shared misc ─────────────────────────────────────────────── */
.stat-row { font-size: .8rem; font-weight: 600; color: var(--color-text-muted); }
.stat-row b { color: var(--color-text); font-family: var(--font-display); font-variant-numeric: tabular-nums; }
@keyframes floatY  { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-6px);} }
@keyframes popUp   { from{opacity:0;transform:translateY(20px) scale(.93);} to{opacity:1;transform:none;} }
@keyframes shake   { 0%,100%{transform:translateX(0);} 20%{transform:translateX(-6px);} 40%{transform:translateX(6px);} 60%{transform:translateX(-4px);} 80%{transform:translateX(4px);} }
@keyframes rowIn   { from{opacity:0;transform:translateX(-8px);} to{opacity:1;transform:none;} }
.lb-list .lb-row   { animation: rowIn .35s ease both; }

@media (prefers-reduced-motion: reduce) {
  .view.active[data-anim] { animation: none !important; }
  *,*::before,*::after { animation-duration: .001ms !important; transition-duration: .001ms !important; }
}

/* ================================================================
   FULL PER-GAME VISUAL IDENTITIES — every world is different
   ================================================================ */

/* Shared: game view hero banner */
.view:not(#view-home):not(#view-classifica) .game-head {
  padding: 2rem 1.5rem 1.8rem;
  margin: -2rem -1.2rem 2rem;
  position: relative;
  overflow: hidden;
}
.view:not(#view-home):not(#view-classifica) .game-head::before {
  content: '';
  position: absolute; inset: 0; z-index: 0;
  background: var(--game-hero, linear-gradient(135deg, #2563eb, #1d4ed8));
}
.view:not(#view-home):not(#view-classifica) .game-head > * { position: relative; z-index: 1; }
.view:not(#view-home):not(#view-classifica) .game-head h1 { color: #fff; text-shadow: 0 2px 8px rgba(0,0,0,.18); }
.view:not(#view-home):not(#view-classifica) .game-head p { color: rgba(255,255,255,.82); }
.view:not(#view-home):not(#view-classifica) .gh-back { background: rgba(255,255,255,.18); border-color: rgba(255,255,255,.28); color: rgba(255,255,255,.9); backdrop-filter: blur(8px); }
.view:not(#view-home):not(#view-classifica) .gh-back:hover { background: rgba(255,255,255,.28); color: #fff; }
.view:not(#view-home):not(#view-classifica) .game-head .chip-btn { background: rgba(255,255,255,.15); border-color: rgba(255,255,255,.28); color: #fff; backdrop-filter: blur(8px); }
.view:not(#view-home):not(#view-classifica) .game-head .chip-btn:hover { background: rgba(255,255,255,.25); }
.view:not(#view-home):not(#view-classifica) .stat-row { font-size: .82rem; color: var(--color-text-muted); margin-bottom: 1.4rem; }

/* ── PAROLE ── newspaper white, physical monospaced tiles ────────── */
#view-parole {
  --game-hero: linear-gradient(135deg, #1e3a8a 0%, #2563eb 60%, #3b82f6 100%);
  background: #f8f9fc;
}
#view-parole .game-head::after {
  content: 'PAROLE'; position: absolute; right: -8px; top: 50%; transform: translateY(-50%);
  font-size: 9rem; font-weight: 900; color: rgba(255,255,255,.06); letter-spacing: -0.06em;
  pointer-events: none; line-height: 1; z-index: 0;
}
#view-parole .tile {
  width: 62px; height: 62px; font-family: "Jost","Futura",sans-serif; font-weight: 900;
  font-size: 2rem; border-radius: 10px;
  border: 2.5px solid #1e3a8a; background: #fff;
  box-shadow: 3px 3px 0 #1e3a8a; color: #1e3a8a;
  transition: transform .15s cubic-bezier(.34,1.56,.64,1);
}
#view-parole .tile.filled { border-color: #1e3a8a; animation: wTilePop .2s cubic-bezier(.34,1.56,.64,1); color: #1e3a8a; }
@keyframes wTilePop { 0%{transform:scale(.75) rotate(-4deg);} 60%{transform:scale(1.12) rotate(2deg);} 100%{transform:scale(1) rotate(0);} }
#view-parole .tile.flip { animation: wTileFlip .6s ease forwards; }
@keyframes wTileFlip { 0%{transform:rotateX(0);} 45%{transform:rotateX(-90deg);} 55%{transform:rotateX(-90deg);} 100%{transform:rotateX(0);} }
#view-parole .tile.correct { background: #16a34a; border-color: #16a34a; color: #fff; box-shadow: 3px 3px 0 #15803d; }
#view-parole .tile.present { background: #d97706; border-color: #d97706; color: #fff; box-shadow: 3px 3px 0 #b45309; }
#view-parole .tile.absent  { background: #374151; border-color: #374151; color: #fff; box-shadow: 3px 3px 0 #1f2937; }
#view-parole .key {
  height: 52px; border-radius: 9px; font-weight: 900; font-size: .9rem;
  background: #fff; border: 2px solid #1e3a8a; color: #1e3a8a;
  box-shadow: 2px 2px 0 #1e3a8a;
  transition: transform .1s ease, box-shadow .1s ease;
}
#view-parole .key:active { transform: translate(2px,2px); box-shadow: 0 0 0 #1e3a8a; }
#view-parole .key.correct { background: #16a34a; border-color: #166534; color: #fff; box-shadow: 2px 2px 0 #166534; }
#view-parole .key.present { background: #d97706; border-color: #b45309; color: #fff; box-shadow: 2px 2px 0 #b45309; }
#view-parole .key.absent  { background: #374151; border-color: #111827; color: #9ca3af; box-shadow: 2px 2px 0 #111827; }

/* ── CRUCIVERBA ── vintage newspaper ──────────────────────────── */
#view-cruciverba {
  --game-hero: linear-gradient(135deg, #4c1d95, #7c3aed 55%, #a855f7);
  background: #fffdf7;
}
#view-cruciverba .game-head::after {
  content: '⬛'; position: absolute; right: 1.5rem; bottom: -.4rem;
  font-size: 5rem; opacity: .12; pointer-events: none; z-index: 0;
}
#view-cruciverba .cw-grid {
  border-radius: 4px; gap: 2px;
  box-shadow: 4px 4px 0 rgba(0,0,0,.7), 0 8px 24px rgba(76,29,149,.18);
  background: #111;
}
#view-cruciverba .cw-cell { background: #fffdf7; }
#view-cruciverba .cw-cell.block { background: #111; }
#view-cruciverba .cw-cell.active-word { background: #ede9fe; }
#view-cruciverba .cw-cell.active-cell { background: #c4b5fd; }
#view-cruciverba .cw-cell input { font-weight: 900; font-size: 1.5rem; color: #1e1b4b; }
#view-cruciverba .cw-cell.cw-correct input { color: #16a34a; }
#view-cruciverba .cw-num { color: #7c3aed; }
#view-cruciverba .cw-clue.active { background: #ede9fe; border-radius: 6px; }
#view-cruciverba .cw-clue b { color: #7c3aed; }
#view-cruciverba .cw-clues h4 { color: #4c1d95; }

/* ── ZIP ── dark neon arcade ──────────────────────────────────── */
#view-zip {
  --game-hero: linear-gradient(135deg, #0c1a2e, #0891b2 80%);
  background: #0d1117;
  color: #e2e8f0;
  min-height: 100vh;
}
#view-zip .stat-row { color: #64748b; }
#view-zip .stat-row b { color: #7dd3fc; }
#view-zip .zip-wrap {
  background: #0f1923;
  border: 1.5px solid rgba(8,145,178,.35);
  box-shadow: 0 0 0 1px rgba(8,145,178,.15), 0 24px 48px rgba(0,0,0,.5), 0 0 60px rgba(8,145,178,.08);
}
#view-zip .zip-board { box-shadow: inset 0 0 0 1px rgba(8,145,178,.22); }
#view-zip .zip-board .gc { border-color: rgba(8,145,178,.15); background: transparent; }
#view-zip .gc.zip-on { background: rgba(8,145,178,.22); box-shadow: inset 0 0 12px rgba(8,145,178,.15); }
#view-zip .zip-num {
  background: linear-gradient(145deg, #0891b2, #06b6d4);
  box-shadow: 0 0 12px rgba(8,145,178,.7), 0 0 24px rgba(8,145,178,.35);
  font-size: 1.1rem;
}
#view-zip .zip-svg { filter: drop-shadow(0 0 8px rgba(8,145,178,.6)); }
#view-zip .chip-btn { background: rgba(8,145,178,.15); border-color: rgba(8,145,178,.3); color: #7dd3fc; }
#view-zip .btn-primary { background: #0891b2; }

/* ── TANGO ── warm celestial ─────────────────────────────────── */
#view-tango {
  --game-hero: linear-gradient(135deg, #78350f, #f59e0b 60%, #fcd34d);
  background: linear-gradient(180deg, #fffbeb, #fff 60%);
}
#view-tango .game-head::before {
  background: linear-gradient(135deg, #92400e, #d97706 50%, #fbbf24);
}
#view-tango .tango-grid {
  border-radius: 16px; overflow: hidden;
  box-shadow: 0 8px 32px rgba(245,158,11,.25), 0 2px 8px rgba(0,0,0,.08);
  border: 2px solid rgba(245,158,11,.3);
}
#view-tango .tango-grid .gc {
  background: #fffbeb;
  border-color: rgba(245,158,11,.22);
}
#view-tango .tango-grid .gc.fixed { background: rgba(245,158,11,.1); }
#view-tango .tango-grid .gc.conflict { background: rgba(220,38,38,.15) !important; }
#view-tango .tango-sym { font-size: 1.8rem; }

#view-queen .queen-cell .q-crown {

#view-memoria .mem-face {

#view-mine .mine-cell {

  background: linear-gradient(145deg, #1e3a28, #16302002);

#view-quindici {

#view-quindici .q15-grid {

}
#view-quindici .q15-tile {

}

/* ── CONNESSIONI ── bright category puzzle ─────────────────── */
#view-connessioni {
  --game-hero: linear-gradient(135deg, #3b0764, #7e22ce 50%, #c026d3);

}
#view-connessioni .conn-grid { gap: 10px; }
#view-connessioni .conn-tile {

#view-connessioni .conn-band {

}
#view-connessioni .conn-band b { font-size: .75rem; letter-spacing: .08em; }
#view-connessioni .conn-band span { font-size: .82rem; }
#view-connessioni .conn-solved { gap: 8px; }
#view-connessioni .conn-actions .btn-primary { background: #7e22ce; }

/* ──────────────────────────────────────────────────────────────
   HOME — BENTO GRID REDESIGN
   ──────────────────────────────────────────────────────────── */
#view-home { background: transparent; }

/* Compact top strip */
.hp-topbar {
  display: flex; align-items: flex-end; justify-content: space-between;
  gap: 1.5rem; padding: 1.6rem 0 1.4rem;
  border-bottom: 1px solid rgba(255,255,255,.06);
  margin-bottom: 1.4rem;
}
.hp-topbar-left { min-width: 0; }
.hp-topdate {
  font-size: .68rem; font-weight: 800; letter-spacing: .12em; text-transform: uppercase;
  color: #60a5fa; margin-bottom: .45rem;
}
.hp-headline {
  font-family: var(--font-display); font-weight: 900;
  font-size: clamp(28px, 3.2vw + 1rem, 52px);
  letter-spacing: -.05em; line-height: .97; color: #f0f0f0;
}
.hp-hl-accent {
  background: linear-gradient(95deg,#60a5fa,#a78bfa,#f472b6);
  -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
}
.hp-tagline {
  font-size: .78rem; color: rgba(255,255,255,.35); font-weight: 600;
  white-space: nowrap; letter-spacing: .01em;
  border: 1px solid rgba(255,255,255,.1); border-radius: 999px;
  padding: .28rem .75rem; align-self: flex-start; flex-shrink: 0;
}

/* ── HOME — Poster Grid ── */
#view-home { background: transparent !important; padding-bottom: 4rem; }

/* Head strip */
.pg-head {
  display: flex; align-items: flex-end; justify-content: space-between;
  gap: 1.2rem; padding: 1.6rem 0 1.8rem;
  border-bottom: 1px solid rgba(255,255,255,.06);
  margin-bottom: 1.8rem; flex-wrap: wrap;
}
.pg-eyebrow {
  font-size: .65rem; font-weight: 800; letter-spacing: .12em;
  text-transform: uppercase; color: rgba(255,255,255,.35);
  display: block; margin-bottom: .35rem;
}
.pg-title {
  font-family: var(--font-display); font-weight: 900;
  font-size: clamp(2rem, 4vw + .5rem, 3.2rem);
  letter-spacing: -.055em; line-height: .96; color: #fff; margin: 0;
}
.pg-title-accent {
  background: linear-gradient(100deg, #60a5fa, #a78bfa);
  -webkit-background-clip: text; background-clip: text;
  -webkit-text-fill-color: transparent;
}
.pg-subtitle {
  font-size: .82rem; color: rgba(255,255,255,.4); font-weight: 500;
  letter-spacing: .01em; align-self: flex-end; padding-bottom: .2rem;
}

/* Poster grid */
.pg-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: .9rem;
}
@media (max-width: 900px) { .pg-grid { grid-template-columns: repeat(3, 1fr); } }
@media (max-width: 620px) { .pg-grid { grid-template-columns: repeat(2, 1fr); } }

/* Poster card */
.pc {
  display: flex; flex-direction: column;
  border-radius: 18px; overflow: hidden;
  text-decoration: none; color: #fff;
  position: relative; cursor: pointer;
  aspect-ratio: 3/4; opacity: 1;
  animation: pcIn .52s cubic-bezier(.22,1,.36,1) both;
  animation-delay: calc(var(--i,0)*42ms);
  transition: transform .3s cubic-bezier(.34,1.56,.64,1), box-shadow .2s;
  box-shadow: 0 2px 8px rgba(0,0,0,.3);
}
.pc:hover {
  transform: translateY(-8px) scale(1.025);
  box-shadow: 0 20px 48px rgba(0,0,0,.45), 0 4px 16px rgba(0,0,0,.25);
  z-index: 2;
}
.pc:active { transform: scale(.97); }
@keyframes pcIn { from{transform:translateY(24px) scale(.93);} to{transform:none;} }

/* Vibrant colored background */
.pc-bg {
  position: absolute; inset: 0; z-index: 0;
  background: var(--ca, #2563eb);
  transition: filter .2s;
}
/* dot texture */
.pc-bg::before {
  content: ''; position: absolute; inset: 0;
  background: radial-gradient(circle, rgba(255,255,255,.14) 1px, transparent 1px);
  background-size: 16px 16px;
}
/* vignette at bottom for text legibility */
.pc-bg::after {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(0deg, rgba(0,0,0,.72) 0%, rgba(0,0,0,.1) 45%, transparent 70%);
}
.pc:hover .pc-bg { filter: brightness(1.12) saturate(1.1); }

/* Centered art */
.pc-art {
  position: relative; z-index: 1;
  flex: 1; display: flex; align-items: center; justify-content: center;
  padding: 1.2rem 1rem .4rem;
  transition: transform .3s cubic-bezier(.34,1.56,.64,1);
}
.pc:hover .pc-art { transform: scale(1.1) rotate(-4deg) translateY(-4px); }
.pc-art svg { display: block; filter: drop-shadow(0 6px 20px rgba(0,0,0,.35)); }

/* Footer */
.pc-foot {
  position: relative; z-index: 2;
  padding: .6rem .8rem .72rem; display: flex; flex-direction: column; gap: .25rem;
}
.pc-foot-row {
  display: flex; align-items: center; justify-content: space-between; gap: .4rem;
}
.pc-name {
  font-family: var(--font-display); font-weight: 900;
  font-size: clamp(.9rem, 2vw + .2rem, 1.1rem);
  letter-spacing: -.03em; color: #fff; white-space: nowrap;
  overflow: hidden; text-overflow: ellipsis;
}
.pc-diff {
  font-size: .55rem; font-weight: 800; letter-spacing: .05em; text-transform: uppercase;
  padding: .14rem .4rem; border-radius: 999px; white-space: nowrap; flex-shrink: 0;
}
.pc-diff--facile    { background: rgba(34,197,94,.28);  color: #bbf7d0; }
.pc-diff--medio     { background: rgba(251,191,36,.25);  color: #fde68a; }
.pc-diff--difficile { background: rgba(248,113,113,.25); color: #fecaca; }
.pc-cta {
  font-size: .68rem; font-weight: 800; color: rgba(255,255,255,.65);
  letter-spacing: .02em; transition: color .15s, letter-spacing .15s;
}
.pc:hover .pc-cta { color: #fff; letter-spacing: .06em; }
.pc-done {
  font-size: .65rem; font-weight: 800; color: #86efac; letter-spacing: .03em;
}
.pc--done { opacity: .65; }
.pc--done:hover { opacity: .9; }

/* ── Bento grid (legacy, hidden) ── */
.hp-bento {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  grid-auto-rows: 168px;
  gap: 10px;
}
@media (max-width: 860px) {
  .hp-bento { grid-template-columns: repeat(2, 1fr); grid-auto-rows: 148px; }
}
@media (max-width: 500px) {
  .hp-bento { grid-template-columns: 1fr; grid-auto-rows: 130px; }
}

/* Card base */
.gc {
  display: flex; flex-direction: column;
  border-radius: 18px; overflow: hidden;
  text-decoration: none; color: inherit;
  background: #17181c;
  border: 1.5px solid rgba(255,255,255,.07);
  box-shadow: 0 2px 8px rgba(0,0,0,.25), 0 8px 20px rgba(0,0,0,.18);
  opacity: 0;
  animation: gcIn .6s cubic-bezier(.22,1,.36,1) forwards;
  animation-delay: calc(var(--i,0)*40ms);
  transition: transform 460ms cubic-bezier(.34,1.56,.64,1), box-shadow .2s, border-color .2s;
  cursor: pointer; position: relative;
}
@keyframes gcIn { from{opacity:0;transform:translateY(24px) scale(.93);} to{opacity:1;transform:none;} }
/* hero + row cards — always visible, animate transform only */
.hc { animation:hcSlideIn .55s cubic-bezier(.22,1,.36,1) both; animation-delay:calc(var(--i,0)*80ms); }
.rc { animation:rcSlideIn .5s cubic-bezier(.22,1,.36,1) both; animation-delay:calc(var(--i,0)*40ms + 300ms); }
@keyframes hcSlideIn { from{opacity:0;transform:translateY(22px) scale(.97);} to{opacity:1;transform:none;} }
@keyframes rcSlideIn { from{opacity:0;transform:translateY(14px) scale(.98);} to{opacity:1;transform:none;} }
.gc:hover {
  transform: translateY(-7px) scale(1.025);
  box-shadow: 0 16px 40px rgba(0,0,0,.32), 0 4px 12px rgba(0,0,0,.18);
  border-color: color-mix(in srgb, var(--ca,#3b82f6) 55%, rgba(255,255,255,.07));
}
.gc:active { transform: translateY(-2px) scale(.98); }
.gc--done .gc-art { filter: saturate(.35) brightness(.7); }

/* XL card: 2×2 */
.gc--xl { grid-column: span 2; grid-row: span 2; border-radius: 22px; }
.gc--xl .gc-art { flex: 1; height: auto; }
.gc--xl .gc-name { font-size: 1.22rem !important; }
.gc--xl .gc-desc { display: block !important; }

/* Wide card: 2×1 — horizontal art+text */
.gc--wide { grid-column: span 2; flex-direction: row !important; border-radius: 18px; }
.gc--wide .gc-art { width: 38% !important; height: 100% !important; flex-shrink: 0; border-radius: 0; }
.gc--wide .gc-info { flex: 1; justify-content: center; padding: .9rem 1rem !important; }
.gc--wide .gc-desc { display: block !important; }
.gc--wide:hover .gc-art { width: 42% !important; }
.gc--wide:hover .gc-art > * { transform: scale(1.08) !important; }

/* SM card: 1×1 */
.gc--sm .gc-desc { display: none; }

/* Art area */
.gc-art {
  width: 100%; height: 105px;
  background: var(--ca, #3b82f6);
  display: flex; align-items: center; justify-content: center;
  position: relative; overflow: hidden;
  transition: height .22s ease, width .22s ease;
}
.gc:not(.gc--wide):hover .gc-art { height: 118px; }
/* dot texture */
.gc-art::before {
  content: ''; position: absolute; inset: 0;
  background: radial-gradient(circle, rgba(255,255,255,.16) 1px, transparent 1px);
  background-size: 14px 14px;
}
/* shine sweep */
.gc-art::after {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(105deg, transparent 28%, rgba(255,255,255,.22) 46%, transparent 64%);
  transform: translateX(-130%); transition: transform .55s ease;
}
.gc:hover .gc-art::after { transform: translateX(130%); }
.gc-art > * { position: relative; z-index: 1; transition: transform 460ms cubic-bezier(.34,1.56,.64,1); }
.gc:hover .gc-art > * { transform: scale(1.12) rotate(-5deg); }

/* Done badge */
.gc-done-badge {

/* ── Animated hero background elements ──────────────────────── */
.hp-hero { position: relative; overflow: hidden; }
.hp-hero::after {
  content: '';
  position: absolute; inset: 0; z-index: 0;
  background:
    radial-gradient(1px 1px at 20% 30%, rgba(255,255,255,.15), transparent),
    radial-gradient(1px 1px at 60% 70%, rgba(255,255,255,.1), transparent),
    radial-gradient(1px 1px at 80% 20%, rgba(255,255,255,.12), transparent);
  background-size: 180px 180px;
  animation: heroNoise 8s linear infinite;
}
@keyframes heroNoise {
  0%   { background-position: 0 0,   0 0,   0 0;   }
  100% { background-position: 180px 180px, -90px 90px, 60px -60px; }
}

/* Floating shapes in hero */
.hp-float {
  position: absolute; z-index: 0; pointer-events: none;
  border-radius: 12px; opacity: .08;
  animation: heroFloat var(--fd,6s) ease-in-out infinite;
  animation-delay: var(--fdelay,0s);
  background: rgba(255,255,255,.8);
}
@keyframes heroFloat {
  0%,100% { transform: translateY(0) rotate(var(--fr,0deg)); }
  50%      { transform: translateY(-12px) rotate(calc(var(--fr,0deg) + 5deg)); }
}

/* ── Game header — taller, more cinematic ────────────────────── */
.view:not(#view-home):not(#view-classifica) .game-head {
  min-height: 160px;
  padding: 2.2rem 2rem 2rem !important;
  align-items: flex-end !important;
}
.view:not(#view-home):not(#view-classifica) .game-head::before {
  border-radius: 0 0 24px 24px;
}
/* Decorative large game title watermark */
.view:not(#view-home):not(#view-classifica) .game-head::after {
  content: attr(data-watermark);
  position: absolute; right: 1.5rem; top: 50%; transform: translateY(-50%);
  font-size: 7rem; font-weight: 900; letter-spacing: -.08em;
  color: rgba(255,255,255,.07); pointer-events: none; z-index: 0;
  line-height: 1;
}

/* ── Per-game header art (right-side SVG illustration) ───────── */
.gh-art {
  position: absolute; right: 1.5rem; bottom: 0; z-index: 1;
  pointer-events: none; opacity: .92;
  animation: artIn .6s cubic-bezier(.34,1.56,.64,1);
}
@keyframes artIn {
  from { opacity:0; transform: translateX(20px) scale(.85); }
  to   { opacity:.92; transform: none; }
}
@media (max-width:600px) { .gh-art { display:none; } }

/* ── Victory modal upgrade ────────────────────────────────────── */
.modal { position: relative; overflow: hidden; }
.modal::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 4px;
  background: linear-gradient(90deg, var(--page-accent), color-mix(in srgb, var(--page-accent) 50%, #fff));
