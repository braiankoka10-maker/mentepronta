/* =========================================================
   === PATCHES ===
   Click a piece to select, R to rotate, click target cell to place anchor.
   ========================================================= */
const Patches = {
  state: null,
  init() {
    const idx = dateSeed() % PATCHES_PUZZLES.length;
    const puz = PATCHES_PUZZLES[idx];
    const targetSet = new Set(puz.target.map(p=>p[0]+'-'+p[1]));
    const pieces = puz.pieces.map((p,i)=>({ id:i, color:p.color, cells:normShape(p.cells), placed:null, rot:0 }));
    this.state = { puz, targetSet, pieces, selected:null, fill:{}, over:false, start:Date.now() };
    const view = $('#view-patches'); view.innerHTML='';
    view.append(gameHeader('Patches', 'Incastra tutti i pezzi per riempire esattamente la forma evidenziata.', [
      chip('','🔁 Ruota (R)','', ()=>this.rotateSel()),
      chip('','🔄 Reset','', ()=>this.reset()),
      chip('','❔','', ()=>helpModal('Come si gioca · Patches',[
        'Riempi tutte le caselle <b>evidenziate</b> usando i pezzi.',
        'Clicca un pezzo per <b>selezionarlo</b>, poi clicca una casella per posizionarlo.',
        'Premi <b>R</b> o il pulsante per <b>ruotare</b> il pezzo selezionato.',
        'Clicca un pezzo già posato per rimuoverlo. Niente sovrapposizioni o fuoriuscite.'
      ]))
    ]));
    view.append(el('div', { class:'stat-row' }, 'Pezzi: ', el('b',{id:'patchLeft',text:pieces.length}), 'Tempo: ', el('b',{id:'patchTime',text:'00:00'})));
    const layout = el('div', { class:'patch-layout' });
    const size=puz.size;
    const card = el('div', { class:'board-card', style:{padding:'8px'} });
    const board = el('div', { class:'grid-board patch-board', id:'patchBoard', role:'grid', 'aria-label':'Tavola Patches', style:{gridTemplateColumns:`repeat(${size},1fr)`, gap:'3px', width:'min(360px,90vw)'} });
    for(let r=0;r<size;r++)for(let c=0;c<size;c++){
      const isT=targetSet.has(r+'-'+c);
      const cell=el('div',{ class:'gc', 'data-r':r,'data-c':c, role:'gridcell',
        style: isT?{background:'var(--color-surface-2)', boxShadow:'inset 0 0 0 2px var(--color-border)'}:{visibility:'hidden'} });
      board.append(cell);
    }
    board.addEventListener('click', e=>{ const cell=e.target.closest('.gc'); if(cell)this.place(+cell.dataset.r,+cell.dataset.c); });
    card.append(board);
    const tray = el('div', { class:'tray', id:'patchTray' });
    layout.append(card, tray);
    view.append(layout);
    this._key = e=>{ if(location.hash.replace('#','')!=='patches')return; if(e.key==='r'||e.key==='R')this.rotateSel(); };
    document.addEventListener('keydown', this._key);
    this._timer = setInterval(()=>{ if(!this.state.over) $('#patchTime').textContent=fmtClock(Date.now()-this.state.start); },1000);
    this.renderTray(); this.renderBoard();
  },
  destroy(){ if(this._key)document.removeEventListener('keydown',this._key); clearInterval(this._timer); },
  reset(){ this.state.pieces.forEach(p=>{p.placed=null;p.rot=0;p.cells=normShape(this.state.puz.pieces[p.id].cells);}); this.state.fill={}; this.state.selected=null; this.state.over=false; this.renderTray(); this.renderBoard(); },
  renderTray(){
    const tray=$('#patchTray'); tray.innerHTML='';
    this.state.pieces.forEach(p=>{
      const maxR=Math.max(...p.cells.map(c=>c[0]))+1, maxC=Math.max(...p.cells.map(c=>c[1]))+1;
      const pg=el('div',{ class:'piece'+(p.placed?' used':'')+(this.state.selected===p.id?' sel':''), 'data-id':p.id,
        style:{gridTemplateColumns:`repeat(${maxC},26px)`}, onclick:()=>this.selectPiece(p.id) });
      const set=new Set(p.cells.map(c=>c[0]+'-'+c[1]));
      for(let r=0;r<maxR;r++)for(let c=0;c<maxC;c++){
        pg.append(el('div',{ class:'pcell'+(set.has(r+'-'+c)?'':' empty'), style: set.has(r+'-'+c)?{background:p.color}:{} }));
      }
      tray.append(pg);
    });
  },
  selectPiece(id){ const p=this.state.pieces.find(x=>x.id===id); if(p.placed){ this.removePiece(id); return; } this.state.selected = this.state.selected===id?null:id; this.renderTray(); },
  rotateSel(){ const id=this.state.selected; if(id==null)return; const p=this.state.pieces.find(x=>x.id===id); p.cells=normShape(p.cells.map(([r,c])=>[c,-r])); p.rot=(p.rot+1)%4; this.renderTray(); },
  place(r,c){
    const id=this.state.selected; if(id==null){ toast('Seleziona prima un pezzo'); return; }
    const p=this.state.pieces.find(x=>x.id===id);
    const target=p.cells.map(([dr,dc])=>[r+dr,c+dc]);
    for(const[tr,tc]of target){ if(!this.state.targetSet.has(tr+'-'+tc)){ toast('Fuori dalla forma'); this.flash(target,false); return; } if(this.state.fill[tr+'-'+tc]!=null){ toast('Sovrapposizione'); this.flash(target,false); return; } }
    target.forEach(([tr,tc])=>this.state.fill[tr+'-'+tc]=id);
    p.placed=[r,c]; this.state.selected=null;
    this.renderTray(); this.renderBoard();
    this.checkWin();
  },
  removePiece(id){ for(const k in this.state.fill)if(this.state.fill[k]===id)delete this.state.fill[k]; this.state.pieces.find(x=>x.id===id).placed=null; this.renderTray(); this.renderBoard(); },
  flash(cells,ok){ cells.forEach(([r,c])=>{ const cell=$(`#patchBoard .gc[data-r="${r}"][data-c="${c}"]`); if(cell){ cell.style.boxShadow=`inset 0 0 0 3px ${ok?'var(--color-success)':'var(--color-error)'}`; setTimeout(()=>cell.style.boxShadow='',500); } }); },
  renderBoard(){
    $$('#patchBoard .gc').forEach(cell=>{
      const k=cell.dataset.r+'-'+cell.dataset.c;
      if(!this.state.targetSet.has(k))return;
      const id=this.state.fill[k];
      if(id!=null){ const col=this.state.pieces.find(p=>p.id===id).color; cell.style.background=col; cell.style.boxShadow='inset 0 -3px 0 rgba(0,0,0,0.14), inset 0 3px 0 rgba(255,255,255,0.4)'; }
      else { cell.style.background='var(--color-surface-2)'; cell.style.boxShadow='inset 0 0 0 2px var(--color-border)'; }
    });
    const left=this.state.pieces.filter(p=>!p.placed).length; const ll=$('#patchLeft'); if(ll) ll.textContent=left;
  },
  checkWin(){
    const s=this.state; if(s.over)return;
    for(const k of s.targetSet) if(s.fill[k]==null) return;
    s.over=true; clearInterval(this._timer); const ms=Date.now()-s.start;
    Stats.record('patches',true); Leaderboard.record('patches', ms); refreshHome();
    victoryModal({ game:'patches', ms, message:`Forma completata in ${fmtClock(ms)}!`, shareFn:()=>copyText(`MentePronta · Patches ${todayStr()}\nRisolto in ${fmtClock(ms)} 🧩\nmentepronta`) });
  }
};
function normShape(cells){
  const minR=Math.min(...cells.map(c=>c[0])), minC=Math.min(...cells.map(c=>c[1]));
  return cells.map(([r,c])=>[r-minR,c-minC]).sort((a,b)=>a[0]-b[0]||a[1]-b[1]);
}

/* =========================================================
   === DATA: MEMORIA ===
   ========================================================= */
const MEMORIA_PAIRS = [
  ['🐶','Cane'],['🐱','Gatto'],['🦊','Volpe'],['🐻','Orso'],['🦁','Leone'],['🐸','Rana'],
  ['🍎','Mela'],['🍋','Limone'],['🍇','Uva'],['🍓','Fragola'],['🍒','Ciliegia'],['🥕','Carota'],
  ['🌞','Sole'],['🌙','Luna'],['⭐','Stella'],['🌈','Arcobaleno'],['🌳','Albero'],['🌹','Rosa'],
  ['🚗','Auto'],['✈️','Aereo'],['🚲','Bici'],['⛵','Barca'],['🏠','Casa'],['🎈','Palloncino']
];

/* =========================================================
   === MEMORIA ===
   ========================================================= */
const Memoria = {
  state: null,
  diffs: { Facile:8, Medio:10, Difficile:12 },
  cols: { 8:4, 10:5, 12:6 },
  init() {
    if (!this.state) this.state = { diff:'Facile' };
    this.start(this.state.diff);
  },
  destroy(){},
  start(diff) {
    const pairs = this.diffs[diff];
    const rnd = seededRand(diff.length+5);
    const chosen = shuffle(MEMORIA_PAIRS, rnd).slice(0, pairs);
    const deck = shuffle(chosen.flatMap((p,i)=>[{id:i,...p},{id:i,...p}]), seededRand(pairs));
    this.state = { diff, deck, flipped:[], matched:0, flips:0, start:Date.now(), over:false, lock:false };
    const view = $('#view-memoria'); view.innerHTML='';
    view.append(gameHeader('Memoria', 'Trova tutte le coppie di parole italiane girando le carte.', [
      ...Object.keys(this.diffs).map(d=>chip('toggle'+(d===diff?' on':''), d, 'memd'+d, ()=>this.start(d))),
      chip('','❔','', ()=>helpModal('Come si gioca · Memoria',[
        'Gira due carte alla volta: se combaciano restano scoperte.',
        'Trova tutte le coppie nel minor numero di mosse e tempo.',
        'Difficoltà: Facile (8), Medio (10), Difficile (12 coppie).'
      ]))
    ]));
    view.append(el('div', { class:'stat-row' }, 'Mosse: ', el('b',{id:'memFlips',text:'0'}), 'Coppie: ', el('b',{id:'memPairs',text:'0/'+pairs}), 'Tempo: ', el('b',{id:'memTime',text:'00:00'})));
    const cols = this.cols[pairs];
    const grid = el('div', { class:'mem-grid', id:'memGrid', role:'grid', 'aria-label':'Carte memoria', style:{gridTemplateColumns:`repeat(${cols},1fr)`} });
    this.state.deck.forEach((card,i)=>{
      const c = el('div', { class:'mem-card', 'data-i':i, role:'gridcell', tabindex:'0', 'aria-label':'carta coperta',
        onclick:()=>this.flip(i) });
      c.append(el('div', { class:'mem-inner' },
        el('div', { class:'mem-face mem-front', text:'?' }),
        el('div', { class:'mem-face mem-back' }, el('span',{text:card[0]}), el('small',{text:card[1]}))
      ));
      grid.append(c);
    });
    view.append(grid);
    this._timer = setInterval(()=>{ if(!this.state.over){ const s=Math.floor((Date.now()-this.state.start)/1000); $('#memTime').textContent=`${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`; } },1000);
  },
  flip(i) {
    const s=this.state; if(s.lock||s.over)return;
    const card=$(`#memGrid .mem-card[data-i="${i}"]`);
    if(card.classList.contains('flipped')||card.classList.contains('matched'))return;
    card.classList.add('flipped'); s.flipped.push(i);
    if(s.flipped.length===2){
      s.flips++; $('#memFlips').textContent=s.flips; s.lock=true;
      const [a,b]=s.flipped;
      if(s.deck[a].id===s.deck[b].id){
        setTimeout(()=>{ [a,b].forEach(x=>$(`#memGrid .mem-card[data-i="${x}"]`).classList.add('matched')); s.matched++; $('#memPairs').textContent=s.matched+'/'+this.diffs[s.diff]; s.flipped=[]; s.lock=false; this.checkWin(); },450);
      } else {
        setTimeout(()=>{ [a,b].forEach(x=>$(`#memGrid .mem-card[data-i="${x}"]`).classList.remove('flipped')); s.flipped=[]; s.lock=false; },800);
      }
    }
  },
  checkWin() {
    const s=this.state; if(s.matched!==this.diffs[s.diff])return;
    s.over=true; clearInterval(this._timer);
    const ms=Date.now()-s.start; const time=fmtClock(ms);
    Stats.record('memoria',true); Leaderboard.record('memoria', ms); refreshHome();
    victoryModal({ game:'memoria', ms, message:`Tutte le coppie trovate in ${s.flips} mosse e ${time}!`, shareFn:()=>copyText(`MentePronta · Memoria ${todayStr()}\n${s.flips} mosse · ${time} 🃏\nmentepronta`) });
  }
};

/* =========================================================
   === DATA: ANAGRAMMA (10 word sets) ===
   ========================================================= */
// Parole italiane di 6-9 lettere, una per giorno (date mod 10)
const ANAGRAMMA_SET = ["FINESTRA","GIARDINO","CAVALLO","MONTAGNA","TASTIERA","OSPEDALE","FARFALLA","CHITARRA","PRIMAVERA","BISCOTTO"];

/* =========================================================
   === ANAGRAMMA ===
   ========================================================= */
const Anagramma = {
  state: null,
  init() {
    const idx = dateSeed() % ANAGRAMMA_SET.length;
    const word = ANAGRAMMA_SET[idx];
    const rnd = seededRand(3);
    let scrambled;
    do { scrambled = shuffle(word.split(''), rnd); } while (scrambled.join('')===word);
    this.state = { word, pool: scrambled.map((ch,i)=>({ch,id:i,used:false})), slots: Array(word.length).fill(null), attempts:0, max:3, over:false };
    const view = $('#view-anagramma'); view.innerHTML='';
    view.append(gameHeader('Anagramma', 'Riordina le lettere per ricostruire la parola italiana nascosta.', [
      chip('','🔀 Mescola','', ()=>this.shufflePool()),
      chip('','❔','', ()=>helpModal('Come si gioca · Anagramma',[
        'Clicca le lettere in basso per inserirle negli spazi.',
        'Clicca una lettera negli spazi per rimuoverla.',
        'Hai <b>3 tentativi</b> per indovinare la parola, poi viene rivelata.'
      ]))
    ]));
    view.append(el('div',{class:'stat-row'}, 'Lettere: ', el('b',{text:word.length}), 'Tentativi: ', el('b',{id:'anaAtt',text:'0/3'})));
    const wrap = el('div', { class:'ana-wrap' });
    wrap.append(el('div', { class:'ana-slots', id:'anaSlots', role:'group', 'aria-label':'Parola in costruzione' }));
    wrap.append(el('div', { class:'ana-pool', id:'anaPool', role:'group', 'aria-label':'Lettere disponibili' }));
    wrap.append(el('div', { style:{display:'flex',gap:'0.6rem',marginTop:'0.5rem'} },
      el('button', { class:'btn-primary', id:'anaCheck', onclick:()=>this.check(), text:'Verifica' }),
      el('button', { class:'btn-ghost', onclick:()=>this.clearSlots(), text:'Cancella' })
    ));
    view.append(wrap);
    this.render();
  },
  destroy(){},
  shufflePool(){ const s=this.state; const free=s.pool.filter(p=>!p.used); const sh=shuffle(free,mulberry32(Date.now())); let i=0; s.pool=s.pool.map(p=>p.used?p:sh[i++]); this.render(); },
  clearSlots(){ const s=this.state; s.slots.fill(null); s.pool.forEach(p=>p.used=false); this.render(); },
  render(){
    const s=this.state;
    const slots=$('#anaSlots'); slots.innerHTML='';
    s.slots.forEach((p,i)=>{
      const t=el('div',{ class:'ana-tile placed', 'data-slot':i, onclick:()=>this.removeFromSlot(i), 'aria-label':p?p.ch:'vuoto' });
      t.textContent=p?p.ch:''; if(!p){t.classList.remove('placed'); t.style.background='var(--color-surface-2)';}
      slots.append(t);
    });
    const pool=$('#anaPool'); pool.innerHTML='';
    s.pool.forEach(p=>{
      if(p.used)return;
      pool.append(el('div',{ class:'ana-tile', onclick:()=>this.addToSlot(p.id), 'aria-label':'lettera '+p.ch, text:p.ch }));
    });
    $('#anaAtt').textContent=s.attempts+'/'+s.max;
  },
  addToSlot(id){ const s=this.state; const p=s.pool.find(x=>x.id===id); if(p.used)return; const i=s.slots.indexOf(null); if(i<0)return; s.slots[i]=p; p.used=true; this.render(); },
  removeFromSlot(i){ const s=this.state; const p=s.slots[i]; if(!p)return; p.used=false; s.slots[i]=null; this.render(); },
  check(){
    const s=this.state; if(s.over)return;
    if(s.slots.includes(null)){ toast('Completa la parola'); return; }
    const guess=s.slots.map(p=>p.ch).join('');
    if(guess===s.word){ s.over=true; Stats.record('anagramma',true); refreshHome();
      victoryModal({ game:'anagramma', message:`Esatto! La parola era ${s.word}.`, shareFn:()=>copyText(`MentePronta · Anagramma ${todayStr()}\nIndovinata al tentativo ${s.attempts+1} 🔡\nmentepronta`) });
      return;
    }
    s.attempts++; this.render();
    if(s.attempts>=s.max){ s.over=true; Stats.record('anagramma',false); refreshHome();
      gameOverModal({ game:'anagramma', message:`La parola era: <strong>${s.word}</strong>` });
    } else { toast(`Sbagliato! Tentativi rimasti: ${s.max-s.attempts}`); this.clearSlots(); }
  }
};

/* =========================================================
   === SHARED UI HELPERS ===
   ========================================================= */
function gameHeader(title, desc, actions) {
  const head = el('div', { class:'game-head' },
    el('div', {}, el('h1', { text:title }), el('p', { text:desc })),
    el('div', { class:'actions' }, ...actions)
  );
  return head;
}
function chip(extra, label, id, onclick) {
  const props = { class:'chip-btn '+extra, onclick };
  if (id) props.id = id;
  return el('button', props, label);
}

/* =========================================================
   === HOME PAGE ===
   ========================================================= */
function renderHome() {
  const view = $('#view-home'); view.innerHTML='';
  const d = new Date();
  const dateLabel = d.toLocaleDateString('it-IT', { weekday:'long', day:'numeric', month:'long', year:'numeric' });
  view.append(el('div', { class:'hero' },
    el('span', { class:'eyebrow', text:'✨ Puzzle del giorno' }),
    el('h1', {}, 'Il tuo allenamento ', el('span', { class:'grad', text:'quotidiano' })),
    el('p', { text:'Allenati ogni giorno con le parole e la logica.' }),
    el('p', { class:'date', text:'📅 '+dateLabel })
  ));
  const grid = el('div', { class:'card-grid', id:'homeGrid' });
  GAMES.forEach((g,i) => grid.append(gameCard(g,i)));
  view.append(grid);
}
function gameCard(g, i) {
  const s = Stats.get(g.id);
  const locked = Plays.isLocked(g.id);
  const card = el('a', { class:'game-card'+(locked?' is-done':''), href:'#'+g.id, 'aria-label':g.name, style:{ '--i': i } });
  if (locked) card.append(el('span', { class:'badge done', text:'✓ Completato' }));
  card.append(
    el('div', { class:'emoji', text:g.emoji }),
    el('h3', { text:g.name }),
    el('p', { text:g.desc }),
    el('div', { class:'meta' },
      el('span', { class:'badge '+diffClass(g.diff), text: diffDot(g.diff)+' '+g.diff }),
      s.streak>0 ? el('span', { class:'streak', text:'🔥 '+s.streak }) : el('span',{class:'streak'})
    ),
    el('span', { class:'card-cta', text: locked ? 'Rivedi →' : 'Gioca →' })
  );
  return card;
}
function refreshHome() {
  if (location.hash.replace('#','')==='home' || location.hash==='') renderHome();
}

/* =========================================================
   === CLASSIFICA (leaderboard view) ===
   ========================================================= */
let lbCurrent = 'zip';
let lbToken = 0;
function renderClassifica() {
  const view = $('#view-classifica'); view.innerHTML='';
  view.append(el('div', { class:'hero' },
    el('h1', { text:'🏆 Classifica del giorno' }),
    el('p', { text:'Condivisa con tutti i giocatori. Vince chi risolve nel minor tempo. Si azzera ogni giorno.' }),
    el('p', { class:'date', text:'Giocatore: '+ (Auth.current ? Auth.displayName() : 'non connesso') })
  ));
  if (!TIMED_GAMES[lbCurrent]) lbCurrent = 'zip';
  const tabs = el('div', { class:'lb-tabs' });
  Object.entries(TIMED_GAMES).forEach(([id,label]) => {
    tabs.append(el('button', { class: id===lbCurrent?'active':'', onclick: ()=>{ lbCurrent=id; renderClassifica(); }, text: label }));
  });
  view.append(tabs);
  const list = el('div', { class:'lb-list', id:'lbList' });
  list.append(el('div', { class:'lb-empty', text:'Caricamento classifica condivisa…' }));
  view.append(list);
  const note = el('p', { style:{fontSize:'var(--fs-xs)',color:'var(--color-text-muted)',marginTop:'0.6rem'} });
  view.append(note);
  view.append(el('p', { style:{marginTop:'1rem'} },
    el('a', { class:'card-cta', href:'#'+lbCurrent, text:'→ Gioca a '+TIMED_GAMES[lbCurrent]+' e batti il record' })));
  // refresh button
  const refreshBtn = el('button', { class:'chip-btn', style:{marginTop:'0.8rem'}, onclick:()=>renderClassifica(), text:'🔄 Aggiorna' });
  view.append(refreshBtn);
  // carica i dati (cloud + locale)
  const my = ++lbToken; const game = lbCurrent;
  loadBoard(game).then(({list:entries, online}) => {
    if (my !== lbToken || lbCurrent !== game) return; // l'utente ha cambiato tab
    list.innerHTML = '';
    const me = Auth.current && !Auth.current.guest ? Auth.displayName() : null;
    if (!entries.length) {
      list.append(el('div', { class:'lb-empty', text:'Nessun tempo registrato oggi. Sii il primo a risolverlo!' }));
    } else {
      const medals = ['gold','silver','bronze'];
      entries.forEach((e,i) => {
        const row = el('div', { class:'lb-row'+(e.name===me?' me':'') });
        row.append(
          el('div', { class:'lb-rank'+(i<3?' '+medals[i]:''), text: i<3 ? ['🥇','🥈','🥉'][i] : (i+1)+'°' }),
          el('div', { class:'lb-name' }, e.name, e.name===me ? el('small',{text:'tu'}) : null),
          el('div', { class:'lb-time', text: fmtClock(e.ms) })
        );
        list.append(row);
      });
    }
    note.textContent = online ? '🌐 Classifica condivisa online · aggiornata in tempo reale' : '⚠️ Database non raggiungibile: mostro solo i tempi salvati su questo dispositivo.';
  });
}

/* =========================================================
   === SCHERMATA "GIÀ GIOCATO OGGI" (lock una volta al giorno) ===
   ========================================================= */
function renderLocked(gameId) {
  const g = GAMES.find(x => x.id === gameId) || { name: gameId, emoji: '✅' };
  const info = Plays.get(gameId);
  const view = $('#view-' + gameId); view.innerHTML = '';
  const card = el('div', { class: 'locked-card' });
  card.append(
    el('div', { class: 'locked-emoji', text: g.emoji }),
    el('h1', {}, 'Hai già giocato a ', el('span', { class: 'grad', text: g.name })),
    el('p', { class: 'locked-sub', text: info && info.won === false
      ? 'Oggi non è andata, ma niente paura: ogni giorno un nuovo rompicapo.'
      : 'Ottimo lavoro! Questo puzzle si gioca una sola volta al giorno.' })
  );
  // riga tempo + posizione (giochi a tempo)
  if (TIMED_GAMES[gameId]) {
    const stat = el('div', { class: 'locked-stat' });
    const t = el('div', { class: 'locked-time', text: '—' });
    const r = el('div', { class: 'locked-rank', text: 'Caricamento posizione…' });
    stat.append(el('div', { class: 'locked-stat-lbl', text: 'Il tuo tempo di oggi' }), t, r);
    card.append(stat);
    const me = Auth.current && !Auth.current.guest ? Auth.displayName() : null;
    loadBoard(gameId).then(({ list }) => {
      const i = list.findIndex(e => e.name === me);
      if (i >= 0) { t.textContent = '⏱️ ' + fmtClock(list[i].ms); r.textContent = `🏆 ${i + 1}° posto su ${list.length} oggi`; }
      else { const loc = Leaderboard.localAll(gameId).find(e => me && e.name === me); if (loc) { t.textContent = '⏱️ ' + fmtClock(loc.ms); r.textContent = 'Salvato in locale'; } else { t.textContent = '✅ Completato'; r.textContent = me ? '' : 'Accedi per salvare i tempi'; } }
    }).catch(() => { t.textContent = '✅ Completato'; r.textContent = ''; });
  }
  // countdown
  const cd = el('div', { class: 'locked-countdown' }, '🕛 Prossimo puzzle tra ', el('span', { class: 'countdown', text: '00:00:00' }));
  attachCountdown(cd.querySelector('.countdown'));
  card.append(cd);
  const actions = el('div', { class: 'modal-actions', style: { marginTop: '1.2rem' } });
  if (TIMED_GAMES[gameId]) actions.append(el('a', { class: 'btn-primary', href: '#classifica', text: '🏆 Vedi la classifica' }));
  actions.append(el('a', { class: 'btn-ghost', href: '#home', text: '🏠 Altri giochi' }));
  card.append(actions);
  view.append(card);
}

/* =========================================================
   === NAV TABS ===
   ========================================================= */
function buildNav() {
  const nav = $('#navTabs');
  GAMES.forEach(g => nav.append(el('a', { href:'#'+g.id, 'data-tab':g.id, text:g.name })));
}

/* =========================================================
   === ROUTER ===
   ========================================================= */
let currentModule = null;
const moduleMap = { parole:()=>Wordle, cruciverba:()=>Cruciverba, zip:()=>Zip, tango:()=>Tango, queen:()=>Queen, patches:()=>Patches, memoria:()=>Memoria, anagramma:()=>Anagramma };
function route() {
  let hash = location.hash.replace('#','') || 'home';
  if (hash!=='home' && hash!=='classifica' && !moduleMap[hash]) hash='home';
  // teardown previous
  if (currentModule && currentModule.destroy) try { currentModule.destroy(); } catch(e){}
  currentModule = null;
  clearCountdowns();
  closeModal();
  // views
  $$('.view').forEach(v=>v.classList.remove('active'));
  const view = $('#view-'+hash); if(view) view.classList.add('active');
  // nav highlight
  $$('#navTabs a').forEach(a=>a.classList.toggle('active', a.dataset.tab===hash));
  $('#leaderBtn').classList.toggle('active', hash==='classifica');
  // init
  if (hash==='home') { renderHome(); }
  else if (hash==='classifica') { renderClassifica(); }
  else if (Plays.isLocked(hash)) { renderLocked(hash); }
  else {
    const mod = moduleMap[hash](); currentModule = mod; mod.init();
    // verifica anche online: se l'utente ha già giocato (altro dispositivo), blocca
    if (TIMED_GAMES[hash] && Auth.current && !Auth.current.guest) {
      const game = hash, name = Auth.displayName();
      loadBoard(game).then(({list}) => {
        if (location.hash.replace('#','') !== game) return;
        if (list.some(e => e.name === name)) { Plays.lock(game, true); if (currentModule && currentModule.destroy) try{currentModule.destroy();}catch(e){} currentModule=null; renderLocked(game); }
      });
    }
  }
  window.scrollTo(0,0);
}

/* =========================================================
   === THEME TOGGLE ===
   ========================================================= */
function initTheme() {
  const prefersDark = matchMedia('(prefers-color-scheme: dark)').matches;
  document.documentElement.setAttribute('data-theme', prefersDark?'dark':'light');
  updateThemeIcon();
  $('#themeToggle').addEventListener('click', ()=>{
    const cur = document.documentElement.getAttribute('data-theme');
    document.documentElement.setAttribute('data-theme', cur==='dark'?'light':'dark');
    updateThemeIcon();
  });
}
function updateThemeIcon() {
  const dark = document.documentElement.getAttribute('data-theme')==='dark';
  $('#themeToggle').textContent = dark?'☀️':'🌙';
  $('#themeToggle').setAttribute('aria-label', dark?'Passa a tema chiaro':'Passa a tema scuro');
}

/* =========================================================
   === INIT ===
   ========================================================= */
function updateUserChip() {
  const btn = $('#userBtn');
  btn.style.display = '';
  btn.innerHTML = '';
  const guest = Auth.current && Auth.current.guest;
  btn.append(
    el('span', { class:'avatar'+(guest?' guest':''), text: guest ? '👤' : Auth.initials() }),
    el('span', { text: Auth.displayName() })
  );
  btn.title = 'Clicca per uscire';
}
function showLogin() { $('#loginOverlay').classList.add('open'); $('#liNome').focus(); }
function hideLogin() { $('#loginOverlay').classList.remove('open'); }
function initAuth() {
  const form = $('#loginForm'), err = $('#loginErr');
  form.addEventListener('submit', e => {
    e.preventDefault();
    const res = Auth.submit($('#liNome').value, $('#liCognome').value, $('#liPass').value);
    if (res.err) { err.textContent = res.err; return; }
    err.textContent=''; form.reset(); hideLogin(); updateUserChip(); refreshHome();
    toast('Ciao '+Auth.current.nome+'! 👋');
  });
  $('#guestBtn').addEventListener('click', () => { Auth.guest(); hideLogin(); updateUserChip(); refreshHome(); });
  $('#userBtn').addEventListener('click', () => {
    confirmModal('Vuoi uscire da "'+Auth.displayName()+'"? Potrai accedere di nuovo o cambiare utente.', () => {
      Auth.logout(); updateUserChip(); showLogin();
    });
  });
  if (Auth.restore()) { updateUserChip(); } else { showLogin(); }
}
function start() {
  initTheme();
  buildNav();
  initAuth();
  window.addEventListener('hashchange', route);
  route();
}
return { start, Stats, Wordle, Auth, Leaderboard };
})();
document.addEventListener('DOMContentLoaded', App.start);
</script>
