<script>
"use strict";
const App = (() => {
/* =========================================================
   === UTILS ===
   ========================================================= */
const $ = (sel, root=document) => root.querySelector(sel);
const $$ = (sel, root=document) => [...root.querySelectorAll(sel)];
const el = (tag, props={}, ...kids) => {
  const n = document.createElement(tag);
  for (const [k,v] of Object.entries(props)) {
    if (k === 'class') n.className = v;
    else if (k === 'html') n.innerHTML = v;
    else if (k === 'text') n.textContent = v;
    else if (k.startsWith('on') && typeof v === 'function') n.addEventListener(k.slice(2).toLowerCase(), v);
    else if (k === 'style' && typeof v === 'object') Object.assign(n.style, v);
    else if (v !== null && v !== undefined && v !== false) n.setAttribute(k, v);
  }
  for (const kid of kids.flat()) { if (kid != null) n.append(kid.nodeType ? kid : document.createTextNode(kid)); }
  return n;
};

// Seeded PRNG (mulberry32)
function mulberry32(seed) {
  let a = seed >>> 0;
  return function() {
    a |= 0; a = a + 0x6D2B79F5 | 0;
    let t = Math.imul(a ^ a >>> 15, 1 | a);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}
// Data del giorno nel fuso orario italiano (Europe/Rome): il puzzle cambia a mezzanotte italiana.
const todayStr = () => new Intl.DateTimeFormat('en-CA', { timeZone:'Europe/Rome', year:'numeric', month:'2-digit', day:'2-digit' }).format(new Date());
const dateSeed = () => parseInt(todayStr().replace(/-/g,''), 10);
function seededRand(salt=0) { return mulberry32(dateSeed() + salt*7919); }
function dayOfYear() {
  const [y,m,d] = todayStr().split('-').map(Number);
  return Math.floor((Date.UTC(y,m-1,d) - Date.UTC(y,0,0)) / 86400000);
}
function shuffle(arr, rnd) {
  const a = arr.slice();
  for (let i = a.length-1; i>0; i--) { const j = Math.floor(rnd()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; }
  return a;
}
function toast(msg) {
  const t = $('#toast'); t.textContent = msg; t.classList.add('show');
  clearTimeout(toast._t); toast._t = setTimeout(()=>t.classList.remove('show'), 1800);
}
function copyText(txt) {
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(txt).then(()=>toast('Copiato!')).catch(()=>fallbackCopy(txt));
  } else fallbackCopy(txt);
}
function fallbackCopy(txt) {
  const ta = el('textarea', { value: txt, style: { position:'fixed', opacity:'0' }});
  document.body.append(ta); ta.select();
  try { document.execCommand('copy'); toast('Copiato!'); } catch(e){ toast('Copia non riuscita'); }
  ta.remove();
}

/* =========================================================
   === STATS (in-memory) ===
   ========================================================= */
const Stats = {
  data: {},
  get(game) {
    if (!this.data[game]) this.data[game] = { played:0, wins:0, streak:0, maxStreak:0, dist:[0,0,0,0,0,0], doneToday:false, lastWon:false };
    return this.data[game];
  },
  record(game, won, guesses=null) {
    const s = this.get(game);
    s.played++; s.doneToday = true; s.lastWon = won;
    if (won) { s.wins++; s.streak++; s.maxStreak = Math.max(s.maxStreak, s.streak); if (guesses!=null && guesses>=1 && guesses<=6) s.dist[guesses-1]++; }
    else s.streak = 0;
    Plays.lock(game, won); // un gioco si gioca una sola volta al giorno
  }
};

/* =========================================================
   === STORAGE (localStorage con fallback in memoria) ===
   ========================================================= */
const Store = (() => {
  let ok = false;
  try { localStorage.setItem('__mp', '1'); localStorage.removeItem('__mp'); ok = true; } catch(e) { ok = false; }
  const mem = {};
  return {
    get(key, def) {
      try { const v = ok ? localStorage.getItem(key) : mem[key]; return v == null ? def : JSON.parse(v); }
      catch(e) { return def; }
    },
    set(key, val) {
      const s = JSON.stringify(val);
      try { if (ok) localStorage.setItem(key, s); else mem[key] = s; } catch(e) { mem[key] = s; }
    }
  };
})();

/* =========================================================
   === PLAYS (un gioco si gioca una sola volta al giorno) ===
   ========================================================= */
const Plays = {
  k(game) { return game + '|' + todayStr(); },
  data() { return Store.get('mp_played', {}); },
  isLocked(game) { return !!this.data()[this.k(game)]; },
  get(game) { return this.data()[this.k(game)] || null; },
  lock(game, won) {
    const d = this.data();
    if (!d[this.k(game)]) { d[this.k(game)] = { won: !!won, ts: Date.now() }; Store.set('mp_played', d); }
  }
};

/* =========================================================
   === AUTH (login nome/cognome/password) ===
   ========================================================= */
const Auth = {
  current: null, // { nome, cognome, guest }
  users() { return Store.get('mp_users', {}); },
  key(nome, cognome) { return (nome.trim()+' '+cognome.trim()).toLowerCase(); },
  // hash leggero (NON sicuro: solo per separare account in locale)
  hash(str) { let h = 5381; for (let i=0;i<str.length;i++) h = (h*33 ^ str.charCodeAt(i)) >>> 0; return h.toString(36); },
  submit(nome, cognome, pass) {
    nome = nome.trim(); cognome = cognome.trim();
    if (!nome || !cognome) return { err: 'Inserisci nome e cognome.' };
    if (pass.length < 3) return { err: 'La password deve avere almeno 3 caratteri.' };
    const users = this.users(); const k = this.key(nome, cognome); const ph = this.hash(pass);
    if (users[k]) { if (users[k].pass !== ph) return { err: 'Password errata per questo utente.' }; }
    else { users[k] = { nome, cognome, pass: ph }; Store.set('mp_users', users); }
    this.current = { nome, cognome, guest: false };
    Store.set('mp_session', this.current);
    return { ok: true };
  },
  guest() { this.current = { nome: 'Ospite', cognome: '', guest: true }; Store.set('mp_session', this.current); },
  restore() { const s = Store.get('mp_session', null); if (s && s.nome) { this.current = s; return true; } return false; },
  logout() { this.current = null; Store.set('mp_session', null); },
  displayName() { return this.current ? (this.current.cognome ? this.current.nome+' '+this.current.cognome : this.current.nome) : 'Ospite'; },
  initials() { if (!this.current) return '?'; const a = (this.current.nome[0]||''); const b = (this.current.cognome[0]||''); return (a+b || a || '?').toUpperCase(); }
};

/* =========================================================
   === LEADERBOARD (classifica giornaliera per gioco) ===
   ========================================================= */
// --- Cloud store condiviso (database pubblico, visibile a tutti) ---
const CLOUD = {
  // Firebase Realtime Database (di proprietà dell'utente — permanente)
  fb: 'https://mentepronta-ad053-default-rtdb.europe-west1.firebasedatabase.app',
  online: null,
  keyUrl(game) { return this.fb + '/scores/' + encodeURIComponent(game + '|' + todayStr()) + '.json'; },
  // legge i punteggi del giorno per un gioco
  async getList(game) {
    const r = await fetch(this.keyUrl(game), { cache: 'no-store' });
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const j = await r.json();
    this.online = true;
    return j ? Object.values(j) : []; // Firebase ritorna null se vuoto
  },
  // aggiunge un punteggio (append: niente sovrascritture, niente race condition)
  async record(game, name, ms) {
    try {
      const r = await fetch(this.keyUrl(game), { method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, ms, ts: Date.now() }) });
      if (!r.ok) throw new Error('HTTP ' + r.status);
      this.online = true; return true;
    } catch (e) { this.online = false; return false; }
  }
};
const Leaderboard = {
  // mirror locale: mp_scores = { "game|YYYY-MM-DD": [ {name, ms, ts} ] }
  k(game) { return game + '|' + todayStr(); },
  localAll(game) { const data = Store.get('mp_scores', {}); return (data[this.k(game)] || []).slice(); },
  record(game, ms) {
    if (!Auth.current || Auth.current.guest) return;
    const name = Auth.displayName();
    const data = Store.get('mp_scores', {}); const key = this.k(game);
    const list = data[key] || [];
    const existing = list.find(e => e.name === name);
    if (existing) { if (ms < existing.ms) { existing.ms = ms; existing.ts = Date.now(); } }
    else list.push({ name, ms, ts: Date.now() });
    data[key] = list; Store.set('mp_scores', data);
    // scrivi anche nel database condiviso (non blocca il gioco)
    CLOUD.record(game, name, ms);
  }
};
// unisce classifica cloud + locale (miglior tempo per nome) e ordina
async function loadBoard(game) {
  let cloudList = null;
  try { cloudList = await CLOUD.getList(game); } catch(e) { cloudList = null; }
  const map = new Map();
  const add = e => { if (!e || !e.name) return; const cur = map.get(e.name); if (!cur || e.ms < cur.ms) map.set(e.name, { name:e.name, ms:e.ms, ts:e.ts }); };
  Leaderboard.localAll(game).forEach(add);
  if (cloudList) cloudList.forEach(add);
  const list = [...map.values()].sort((a,b)=>a.ms-b.ms);
  return { list, online: cloudList !== null };
}
// giochi che registrano un tempo in classifica
const TIMED_GAMES = { zip:'Zip', tango:'Tango', queen:'Queen', patches:'Patches', cruciverba:'Cruciverba', memoria:'Memoria', sudoku:'Sudoku', mine:'Campo Minato', quindici:'Quindici', connessioni:'Connessioni' };
function fmtClock(ms) {
  const s = Math.floor(ms/1000);
  return `${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
}

/* =========================================================
   === COUNTDOWN TO MIDNIGHT ===
   ========================================================= */
let countdownTimers = [];
function nextMidnight() {
  // istante della prossima mezzanotte italiana (indipendente dal fuso del giocatore)
  const now = new Date();
  const p = new Intl.DateTimeFormat('en-GB', { timeZone:'Europe/Rome', hour:'2-digit', minute:'2-digit', second:'2-digit', hour12:false }).formatToParts(now);
  const get = t => +p.find(x=>x.type===t).value;
  let h = get('hour'); if (h === 24) h = 0;
  const secsLeft = 24*3600 - (h*3600 + get('minute')*60 + get('second'));
  return new Date(now.getTime() + secsLeft*1000);
}
function fmtHMS(ms) {
  if (ms < 0) ms = 0;
  const s = Math.floor(ms/1000);
  const hh = String(Math.floor(s/3600)).padStart(2,'0');
  const mm = String(Math.floor(s%3600/60)).padStart(2,'0');
  const ss = String(s%60).padStart(2,'0');
  return `${hh}:${mm}:${ss}`;
}
function attachCountdown(node) {
  const tick = () => { node.textContent = fmtHMS(nextMidnight() - Date.now()); };
  tick(); const id = setInterval(tick, 1000); countdownTimers.push(id);
}
function clearCountdowns() { countdownTimers.forEach(clearInterval); countdownTimers = []; }

/* =========================================================
   === CONFETTI ===
   ========================================================= */
function confetti() {
  if (matchMedia('(prefers-reduced-motion: reduce)').matches) return;
  const cv = $('#confetti'); const ctx = cv.getContext('2d');
  cv.width = innerWidth; cv.height = innerHeight;
  const colors = ['#2563eb','#16a34a','#eab308','#dc2626','#c9b458','#6aaa64'];
  const parts = Array.from({length: 140}, () => ({
    x: innerWidth/2, y: innerHeight/3,
    vx: (Math.random()-0.5)*14, vy: Math.random()*-14-4,
    s: Math.random()*7+4, c: colors[Math.floor(Math.random()*colors.length)],
    rot: Math.random()*6, vr: (Math.random()-0.5)*0.4, life: 1
  }));
  let frame = 0;
  (function anim() {
    ctx.clearRect(0,0,cv.width,cv.height); frame++;
    parts.forEach(p => {
      p.vy += 0.35; p.x += p.vx; p.y += p.vy; p.rot += p.vr; p.life -= 0.008;
      ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.rot); ctx.globalAlpha = Math.max(0,p.life);
      ctx.fillStyle = p.c; ctx.fillRect(-p.s/2,-p.s/2,p.s,p.s); ctx.restore();
    });
    if (frame < 160) requestAnimationFrame(anim); else ctx.clearRect(0,0,cv.width,cv.height);
  })();
}

/* =========================================================
   === MODAL ===
   ========================================================= */
function openModal(builder) {
  const box = $('#modalBox'); box.innerHTML = '';
  builder(box);
  $('#modalOverlay').classList.add('open');
}
function closeModal() { $('#modalOverlay').classList.remove('open'); }
$('#modalOverlay').addEventListener('click', e => { if (e.target.id === 'modalOverlay') closeModal(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

function statsModal(game, gameLabel) {
  openModal(box => {
    const s = Stats.get(game);
    const winPct = s.played ? Math.round(s.wins/s.played*100) : 0;
    box.append(
      el('h2', { text: 'Statistiche · ' + gameLabel }),
      el('div', { class: 'stats-grid' },
        statCell(s.played, 'Giocate'), statCell(winPct+'%', 'Vittorie'),
        statCell(s.streak, 'Serie'), statCell(s.maxStreak, 'Record')
      )
    );
    if (game === 'parole') {
      box.append(el('h2', { style:{fontSize:'var(--fs-lg)',marginTop:'0.5rem'}, text:'Distribuzione' }));
      const max = Math.max(1, ...s.dist);
      for (let i=0;i<6;i++) {
        const w = 8 + (s.dist[i]/max)*92;
        box.append(el('div', { class:'dist-row' },
          el('span', { text: (i+1) }),
          el('div', { class:'dist-bar'+(s.lastWon && Wordle.state && Wordle.state.winRow===i+1?' hl':''), style:{width:w+'%'}, text: s.dist[i] })
        ));
      }
    }
    box.append(modalFooter());
  });
}
function statCell(num, lbl) { return el('div', {}, el('div', { class:'num', text:String(num) }), el('div', { class:'lbl', text:lbl })); }
function modalFooter(extra) {
  const f = el('div', { class:'modal-actions' });
  if (extra) f.append(extra);
  f.append(el('button', { class:'btn-ghost', onclick: closeModal, text:'Chiudi' }));
  return f;
}
function victoryModal(opts) {
  // opts: {title, message, game, gameLabel, guesses, shareFn}
  confetti();
  openModal(box => {
    box.append(el('h2', { text: opts.title || '🎉 Complimenti!' }));
    box.append(el('p', { text: opts.message || 'Hai risolto il puzzle del giorno!' }));
    if (opts.extra) box.append(opts.extra);
    const s = Stats.get(opts.game);
    const winPct = s.played ? Math.round(s.wins/s.played*100) : 0;
    box.append(el('div', { class:'stats-grid' },
      statCell(s.played,'Giocate'), statCell(winPct+'%','Vittorie'),
      statCell(s.streak,'Serie'), statCell(s.maxStreak,'Record')
    ));
    // riga classifica (solo giochi a tempo) — legge la classifica condivisa
    if (TIMED_GAMES[opts.game] && opts.ms != null) {
      const line = el('div', { style:{textAlign:'center',margin:'0.8rem 0',padding:'0.7rem',background:'var(--color-surface-2)',borderRadius:'var(--radius-md)'} });
      line.append(el('div', { style:{fontWeight:'700',fontSize:'var(--fs-lg)'}, text:'⏱️ '+fmtClock(opts.ms) }));
      const sub = el('div', { style:{fontSize:'var(--fs-sm)',color:'var(--color-text-muted)',marginTop:'2px'} });
      if (Auth.current && Auth.current.guest) sub.textContent = 'Accedi per entrare nella classifica condivisa';
      else sub.textContent = 'Aggiornamento classifica…';
      line.append(sub); box.append(line);
      if (!(Auth.current && Auth.current.guest)) {
        const name = Auth.displayName();
        loadBoard(opts.game).then(({list, online}) => {
          const i = list.findIndex(e => e.name === name);
          if (i >= 0) sub.textContent = `Sei ${i+1}° su ${list.length} nella classifica di oggi` + (online ? '' : ' (offline)');
          else sub.textContent = online ? 'Tempo registrato in classifica!' : 'Salvato in locale (database non raggiungibile)';
        }).catch(()=>{ sub.textContent = 'Tempo salvato in locale'; });
      }
    }
    const cd = el('p', { style:{textAlign:'center',marginTop:'0.6rem'} },
      'Prossimo puzzle tra ', el('span', { class:'countdown', text:'00:00:00' }));
    attachCountdown(cd.querySelector('.countdown'));
    box.append(cd);
    const actions = el('div', { class:'modal-actions' });

    this.kbLayout.forEach(rowKeys => {
      const kr = el('div', { class:'kb-row' });
      rowKeys.forEach(k => {
        const wide = k.length>1;
        kr.append(el('div', { class:'key'+(wide?' wide':''), 'data-key':k, role:'button', tabindex:'0', 'aria-label':k,
          onclick: ()=>this.press(k), text: k==='CANC'?'⌫':k }));
      });
      kb.append(kr);
    });
    center.append(kb);
    view.append(center);
    this._keyHandler = (e) => { if (location.hash.replace('#','')!=='parole') return; this.physical(e); };
    document.addEventListener('keydown', this._keyHandler);
    if (Stats.get('parole').doneToday) { /* allow replay but stats already recorded */ }
  },
  destroy() { if (this._keyHandler) document.removeEventListener('keydown', this._keyHandler); },
  toggleHard() {
    if (this.state.row>0) { toast('Hard Mode solo a inizio partita'); return; }
    this.state.hard = !this.state.hard;
    $('#hardBtn').classList.toggle('on', this.state.hard);
    toast(this.state.hard?'Hard Mode attiva':'Hard Mode disattiva');
  },
  physical(e) {
    if (this.state.over) return;
    if (e.key === 'Enter') { this.press('INVIO'); }
    else if (e.key === 'Backspace') { this.press('CANC'); }
    else if (/^[a-zA-Zàèéìòù]$/.test(e.key)) { this.press(e.key.toLowerCase()); }
  },
  press(k) {
    const s = this.state; if (s.over) return;
    if (k === 'CANC') {
      if (s.col>0) { s.col--; s.board[s.row][s.col]=''; this.renderTile(s.row,s.col); }
    } else if (k === 'INVIO') { this.submit(); }
    else if (s.col<5 && /^[a-zàèéìòù]$/.test(k)) {
      s.board[s.row][s.col]=k; this.renderTile(s.row,s.col); s.col++;
    }
  },
  renderTile(r,c) {
    const t = $('#wt'+r+'-'+c); const v = this.state.board[r][c];
    t.textContent = v; t.classList.toggle('filled', !!v); t.setAttribute('aria-label', v||'vuota');
  },
  submit() {
    const s = this.state;
    if (s.col<5) { this.shake(); toast('Troppo corta'); return; }
    const guess = s.board[s.row].join('');
    if (!PAROLE_VALID.has(guess)) { this.shake(); toast('Parola non in elenco'); return; }
    if (s.hard) {
      const err = this.hardCheck(guess);
      if (err) { this.shake(); toast(err); return; }
    }
    const result = this.score(guess, s.answer);
    // update hints for hard mode
    result.forEach((res,i)=>{ if(res==='correct') s.hints['pos'+i]=guess[i]; if(res!=='absent') s.hints['has_'+guess[i]]=true; });
    const row = s.row;
    result.forEach((res,i)=>{
      const t = $('#wt'+row+'-'+i);
      setTimeout(()=>{ t.classList.add('flip'); setTimeout(()=>{ t.classList.add(res); this.markKey(s.board[row][i],res); }, 250); }, i*180);
    });
    if (guess === s.answer) {
      s.won = true; s.over = true; s.winRow = row+1;
      setTimeout(()=>{ Stats.record('parole', true, row+1); refreshHome(); victoryModal({
        game:'parole', message:`Hai indovinato "${s.answer.toUpperCase()}" in ${row+1} tentativ${row===0?'o':'i'}!`,
        shareFn: ()=>this.share()
      }); }, 5*180+400);
    } else if (row === 5) {
      s.over = true;
      setTimeout(()=>{ Stats.record('parole', false); refreshHome(); gameOverModal({
        game:'parole', message:`La soluzione era: <strong>${s.answer.toUpperCase()}</strong>`, shareFn: ()=>this.share()
      }); }, 5*180+400);
    } else { s.row++; s.col=0; }
  },
  hardCheck(guess) {
    const s = this.state;
    for (let i=0;i<5;i++) if (s.hints['pos'+i] && guess[i]!==s.hints['pos'+i]) return `La ${i+1}ª lettera deve essere ${s.hints['pos'+i].toUpperCase()}`;
    for (const key in s.hints) if (key.startsWith('has_')) { const l = key.slice(4); if (!guess.includes(l)) return `Devi usare la lettera ${l.toUpperCase()}`; }
    return null;
  },
  score(guess, answer) {
    const res = Array(5).fill('absent'); const counts = {};
    for (const ch of answer) counts[ch]=(counts[ch]||0)+1;
    for (let i=0;i<5;i++) if (guess[i]===answer[i]) { res[i]='correct'; counts[guess[i]]--; }
    for (let i=0;i<5;i++) if (res[i]!=='correct' && counts[guess[i]]>0) { res[i]='present'; counts[guess[i]]--; }
    return res;
  },
  markKey(letter, res) {
    const key = $(`#wKb .key[data-key="${letter}"]`); if (!key) return;
    const rank = { correct:3, present:2, absent:1 };
    const cur = key.classList.contains('correct')?3:key.classList.contains('present')?2:key.classList.contains('absent')?1:0;
    if (rank[res] >= cur) { key.classList.remove('correct','present','absent'); key.classList.add(res); }
  },
  shake() { const row = $('#wrow'+this.state.row); row.classList.add('shake'); setTimeout(()=>row.classList.remove('shake'),500); }
  ,share() {
    const s = this.state;
    const emoji = { correct:'🟩', present:'🟨', absent:'⬜' };
    let grid = '';
    for (let r=0; r<=(s.won?s.winRow-1:5); r++) {
      const res = this.score(s.board[r].join(''), s.answer);
      grid += res.map(x=>emoji[x]).join('') + '\n';
    }
    const n = s.won ? s.winRow : 'X';
    copyText(`MentePronta · Parole ${todayStr()}\n${n}/6\n\n${grid}\nmentepronta`);
  }
};

// across keyed 1,6,11,16,21 (righe) · down keyed 1,2,3,4,5 (colonne).

/* =========================================================
   === CRUCIVERBA ===
   ========================================================= */
const Cruciverba = {
  state: null,
  init() {
    const idx = dayOfYear() % CRUCIVERBA_PUZZLES.length;
    const puz = CRUCIVERBA_PUZZLES[idx];
    const sol = puz.grid.map(r => r.padEnd(5,'.').slice(0,5).split(''));
    this.state = { puz, sol, dir:'across', sel:null, start:Date.now(), over:false, numbers:{} };
    this.computeNumbers();
    const view = $('#view-cruciverba'); view.innerHTML='';
    view.append(gameHeader('Cruciverba', 'Mini cruciverba 5×5. Clicca una casella, scrivi, premi Tab per cambiare direzione.', [
      chip('','✓ Verifica','', ()=>this.check()),
      chip('','💡 Rivela','', ()=>confirmModal('Vuoi rivelare l\'intera soluzione? La partita verrà conclusa.', ()=>this.reveal())),
      chip('','❔','', ()=>helpModal('Come si gioca · Cruciverba',[
        'Completa la griglia 5×5 usando le definizioni.',
        'Clicca una casella per selezionarla; <b>Tab</b> o un secondo click cambia direzione (Orizzontale/Verticale).',
        'Il cursore avanza da solo; <b>Backspace</b> cancella e torna indietro.',
        'Usa <b>✓ Verifica</b> per controllare: verde = giusto, rosso = sbagliato.'
      ]))
    ]));
    const stat = el('div', { class:'stat-row' }, 'Tempo: ', el('b', { id:'cwTime', text:'00:00' }));
    view.append(stat);
    const layout = el('div', { class:'cw-layout' });
    const grid = el('div', { class:'cw-grid', role:'grid', 'aria-label':'Griglia cruciverba' });
    for (let r=0;r<5;r++) for (let c=0;c<5;c++) {
      const block = sol[r][c]==='.';
      const cell = el('div', { class:'cw-cell'+(block?' block':''), 'data-r':r, 'data-c':c, role:'gridcell' });
      if (!block) {
        const num = this.state.numbers[r+'-'+c];
        if (num) cell.append(el('span', { class:'cw-num', text:num }));
        const inp = el('input', { maxlength:'1', 'aria-label':`riga ${r+1} colonna ${c+1}`, autocomplete:'off', inputmode:'text' });
        inp.addEventListener('focus', ()=>this.selectCell(r,c,false));
        inp.addEventListener('input', e=>this.onInput(r,c,e));
        inp.addEventListener('keydown', e=>this.onKey(r,c,e));
        inp.addEventListener('click', ()=>this.selectCell(r,c,true));
        cell.append(inp);
      }
      grid.append(cell);
    }
    layout.append(grid);
    const clues = el('div', { class:'cw-clues' });
    clues.append(this.cluePanel('Orizzontale','across'), this.cluePanel('Verticale','down'));
    layout.append(clues);
    view.append(layout);
    this._timer = setInterval(()=>{ if(!this.state.over){ const sec=Math.floor((Date.now()-this.state.start)/1000); $('#cwTime').textContent=`${String(Math.floor(sec/60)).padStart(2,'0')}:${String(sec%60).padStart(2,'0')}`; } },1000);
    // select first open cell
    for (let r=0;r<5;r++) for (let c=0;c<5;c++) if (sol[r][c]!=='.') { this.selectCell(r,c,false); return; }
  },
  destroy() { clearInterval(this._timer); },
  computeNumbers() {
    const sol = this.state.sol; let n=0;
    for (let r=0;r<5;r++) for (let c=0;c<5;c++) {
      if (sol[r][c]==='.') continue;
      const startA = (c===0||sol[r][c-1]==='.') && c<4 && sol[r][c+1]!=='.';
      const startD = (r===0||sol[r-1][c]==='.') && r<4 && sol[r+1][c]!=='.';
      if (startA||startD) { n++; this.state.numbers[r+'-'+c]=n; }
    }
  },
  cluePanel(title, dir) {
    const p = el('div', {}); p.append(el('h4', { text:title }));
    const clues = this.state.puz[dir];
    for (const [num, text] of Object.entries(clues)) {
      p.append(el('div', { class:'cw-clue', 'data-dir':dir, 'data-num':num, onclick:()=>this.gotoClue(dir,num) },
        el('b', { text:num }), el('span', { text })));
    }
    return p;
  },
  cellInput(r,c) { return $(`.cw-cell[data-r="${r}"][data-c="${c}"] input`); },
  selectCell(r,c,toggle) {
    const s = this.state; if (s.sol[r][c]==='.') return;
    if (toggle && s.sel && s.sel[0]===r && s.sel[1]===c) s.dir = s.dir==='across'?'down':'across';
    s.sel = [r,c];
    this.highlight();
    const inp = this.cellInput(r,c); if (document.activeElement!==inp) inp.focus();
  },
  wordCells(r,c,dir) {
    const sol = this.state.sol; const cells=[];
    if (dir==='across') { let cc=c; while(cc>0&&sol[r][cc-1]!=='.')cc--; while(cc<5&&sol[r][cc]!=='.'){cells.push([r,cc]);cc++;} }
    else { let rr=r; while(rr>0&&sol[rr-1][c]!=='.')rr--; while(rr<5&&sol[rr][c]!=='.'){cells.push([rr,c]);rr++;} }
    return cells;
  },
  highlight() {
    $$('.cw-cell').forEach(c=>c.classList.remove('active-word','active-cell','cw-wrong'));
    $$('.cw-clue').forEach(c=>c.classList.remove('active'));
    const s = this.state; if (!s.sel) return;
    const [r,c]=s.sel;
    this.wordCells(r,c,s.dir).forEach(([rr,cc])=>$(`.cw-cell[data-r="${rr}"][data-c="${cc}"]`).classList.add('active-word'));
    $(`.cw-cell[data-r="${r}"][data-c="${c}"]`).classList.add('active-cell');
    // active clue
    const wc = this.wordCells(r,c,s.dir)[0];
    const num = this.state.numbers[wc[0]+'-'+wc[1]];
    const cl = $(`.cw-clue[data-dir="${s.dir}"][data-num="${num}"]`); if (cl) cl.classList.add('active');
  },
  onInput(r,c,e) {
    const v = e.target.value.toUpperCase().replace(/[^A-ZÀÈÉÌÒÙ]/g,'');
    e.target.value = v.slice(-1);
    if (e.target.value) this.advance(r,c);
    this.checkComplete();
  },
  onKey(r,c,e) {
    const s = this.state;
    if (e.key==='Tab') { e.preventDefault(); s.dir = s.dir==='across'?'down':'across'; this.highlight(); }
    else if (e.key==='Backspace') {
      if (!e.target.value) { e.preventDefault(); this.retreat(r,c); }
    }
    else if (e.key.startsWith('Arrow')) {
      e.preventDefault();
      const map={ArrowUp:[-1,0],ArrowDown:[1,0],ArrowLeft:[0,-1],ArrowRight:[0,1]};
      let [dr,dc]=map[e.key]; let nr=r+dr,nc=c+dc;
      while(nr>=0&&nr<5&&nc>=0&&nc<5){ if(s.sol[nr][nc]!=='.'){ this.selectCell(nr,nc,false); break; } nr+=dr;nc+=dc; }
    }
  },
  advance(r,c) {
    const cells = this.wordCells(r,c,this.state.dir);
    const i = cells.findIndex(([rr,cc])=>rr===r&&cc===c);
    if (i<cells.length-1) this.selectCell(cells[i+1][0],cells[i+1][1],false);
  },
  retreat(r,c) {
    const cells = this.wordCells(r,c,this.state.dir);
    const i = cells.findIndex(([rr,cc])=>rr===r&&cc===c);
    if (i>0) { const [pr,pc]=cells[i-1]; this.cellInput(pr,pc).value=''; this.selectCell(pr,pc,false); }
  },
  gotoClue(dir,num) {
    this.state.dir = dir;
    for (const [key,n] of Object.entries(this.state.numbers)) if (n==num) { const [r,c]=key.split('-').map(Number); this.selectCell(r,c,false); return; }
  },
  check() {
    const s = this.state; let allRight=true, anyFilled=false;
    for (let r=0;r<5;r++) for (let c=0;c<5;c++) {
      if (s.sol[r][c]==='.') continue;
      const cellDiv = $(`.cw-cell[data-r="${r}"][data-c="${c}"]`);
      const v = (this.cellInput(r,c).value||'').toUpperCase();
      if (v) anyFilled=true;
      cellDiv.classList.remove('cw-correct','cw-wrong');
      if (v===s.sol[r][c]) cellDiv.classList.add('cw-correct');
      else { allRight=false; if (v) { cellDiv.classList.add('cw-wrong'); setTimeout(()=>cellDiv.classList.remove('cw-wrong'),900); } }
    }
    if (!anyFilled) toast('Compila qualche casella');
    else if (allRight) this.win();
    else toast('Ci sono errori');
  },
  checkComplete() {
    const s = this.state;
    for (let r=0;r<5;r++) for (let c=0;c<5;c++) {
      if (s.sol[r][c]==='.') continue;
      if ((this.cellInput(r,c).value||'').toUpperCase()!==s.sol[r][c]) return;
    }
    this.win();
  },
  reveal() {
    const s = this.state;
    for (let r=0;r<5;r++) for (let c=0;c<5;c++) if (s.sol[r][c]!=='.') this.cellInput(r,c).value=s.sol[r][c];
    s.over=true; clearInterval(this._timer);
    Stats.record('cruciverba', false); refreshHome();
    gameOverModal({ game:'cruciverba', title:'Soluzione rivelata', message:'Hai rivelato la griglia. Riprova domani!' });
  },
  win() {
    const s = this.state; if (s.over) return; s.over=true; clearInterval(this._timer);
    const ms = Date.now()-s.start; const time = fmtClock(ms);
    Stats.record('cruciverba', true); Leaderboard.record('cruciverba', ms); refreshHome();
    victoryModal({ game:'cruciverba', ms, message:`Cruciverba completato in ${time}!`, shareFn:()=>copyText(`MentePronta · Cruciverba ${todayStr()}\nRisolto in ${time} ✅\nmentepronta`) });
  }
};

/* =========================================================
   === DATA: ZIP (3 puzzle) — path through numbered dots ===
   Each puzzle: size, dots {n:[r,c]}. Solution path visits all cells.
   We provide solvable hand-made puzzles where consecutive numbers
   are reachable. The full grid must be covered by the path.
   ========================================================= */
const ZIP_PUZZLES = [
  { size:5, label:'Facile', dots:{1:[0,0],2:[0,4],3:[4,4],4:[4,0],5:[2,2]} },
  { size:6, label:'Medio', dots:{1:[0,0],2:[0,5],3:[5,5],4:[5,0],5:[2,2],6:[3,3]} },
  { size:6, label:'Difficile', dots:{1:[0,2],2:[2,1],3:[2,0],4:[3,4],5:[4,0],6:[5,4],7:[1,5],8:[2,3]} }
];

/* =========================================================
   === ZIP ===
   Player draws a path covering every cell, visiting dots in order.
   Click/drag adjacent cells to extend path; click last to undo.
   ========================================================= */
const Zip = {
  state: null,
  init() {
    const idx = dateSeed() % ZIP_PUZZLES.length;
    const puz = ZIP_PUZZLES[idx];
    const cellOf = {}; for (const [n,rc] of Object.entries(puz.dots)) cellOf[rc[0]+'-'+rc[1]]=+n;
    this.state = { puz, cellOf, path:[], moves:0, start:Date.now(), over:false, drawing:false };
    const view = $('#view-zip'); view.innerHTML='';
    view.append(gameHeader('Zip', 'Traccia un percorso unico che tocca tutte le caselle passando dai numeri in ordine.', [
      chip('','↩ Annulla','', ()=>this.undo()),
      chip('','🔄 Reset','', ()=>this.reset()),
      chip('','❔','', ()=>helpModal('Come si gioca · Zip',[
        'Disegna <b>un solo percorso continuo</b> che attraversa tutte le caselle.',
        'Devi passare per i numeri <b>in ordine</b> (1→2→3…).',
        'Il percorso <b>non può incrociarsi</b> né saltare caselle.',
        'Clicca o trascina su caselle adiacenti per estendere; clicca l\'ultima per annullare.'
      ]))
    ]));
    view.append(el('div', { class:'stat-row' }, 'Difficoltà: ', el('b',{text:puz.label}), 'Mosse: ', el('b',{id:'zipMoves',text:'0'}), 'Tempo: ', el('b',{id:'zipTime',text:'00:00'})));
    const wrap = el('div', { class:'zip-wrap' });
    const svg = el('svg', { class:'zip-svg', id:'zipSvg', viewBox:'0 0 100 100', preserveAspectRatio:'none' });
    const board = el('div', { class:'grid-board zip-board', id:'zipBoard', role:'grid', 'aria-label':'Griglia Zip', style:{ gridTemplateColumns:`repeat(${puz.size},1fr)`, width:'100%' } });
    for (let r=0;r<puz.size;r++) for (let c=0;c<puz.size;c++) {
      const n = cellOf[r+'-'+c];
      const cell = el('div', { class:'gc zip-dot queen-cell', 'data-r':r, 'data-c':c, role:'gridcell', 'aria-label': n?('numero '+n):`cella ${r},${c}` });
      if (n) cell.append(el('span', { class:'zip-num', text:n }));
      board.append(cell);
    }
    wrap.append(svg, board);
    view.append(wrap);
    // events (pointer)
    board.addEventListener('pointerdown', e=>{ const cell=e.target.closest('.gc'); if(!cell)return; this.state.drawing=true; this.tryAdd(+cell.dataset.r,+cell.dataset.c); });
    board.addEventListener('pointerover', e=>{ if(!this.state.drawing)return; const cell=e.target.closest('.gc'); if(!cell)return; this.tryAdd(+cell.dataset.r,+cell.dataset.c); });
    document.addEventListener('pointerup', this._up = ()=>{ this.state.drawing=false; });
    this._timer = setInterval(()=>{ if(!this.state.over){ const s=Math.floor((Date.now()-this.state.start)/1000); $('#zipTime').textContent=`${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`; } },1000);
    this.render();
  },
  destroy() { clearInterval(this._timer); if(this._up) document.removeEventListener('pointerup',this._up); },
  reset() { this.state.path=[]; this.state.moves=0; this.state.over=false; this.render(); },
  undo() { this.state.path.pop(); this.render(); },
  adjacent(a,b){ return Math.abs(a[0]-b[0])+Math.abs(a[1]-b[1])===1; },
  tryAdd(r,c) {
    const s=this.state; if(s.over) return;
    const path=s.path; const key=[r,c];
    if (path.length===0) {
      if (s.cellOf[r+'-'+c]===1) { path.push(key); s.moves++; this.render(); }
      else toast('Inizia dalla casella 1');
      return;
    }
    const last=path[path.length-1];
    if (last[0]===r&&last[1]===c) return;
    // step back
    if (path.length>=2 && path[path.length-2][0]===r && path[path.length-2][1]===c) { path.pop(); this.render(); return; }
    if (path.some(p=>p[0]===r&&p[1]===c)) { return; } // already visited
    if (!this.adjacent(last,key)) return;
    // numbered cells must be in order
    const num = s.cellOf[r+'-'+c];
    if (num) {
      const visitedNums = path.map(p=>s.cellOf[p[0]+'-'+p[1]]).filter(Boolean);
      const maxN = visitedNums.length?Math.max(...visitedNums):0;
      if (num !== maxN+1) { toast('Devi seguire l\'ordine dei numeri'); return; }
    }
    path.push(key); s.moves++; this.render();
    this.checkWin();
  },
  render() {
    const s=this.state; const size=s.puz.size;
    $('#zipMoves').textContent=s.moves;
    $$('#zipBoard .gc').forEach(c=>{ c.classList.remove('zip-on','zip-next'); });
    s.path.forEach(([r,c])=>$(`#zipBoard .gc[data-r="${r}"][data-c="${c}"]`).classList.add('zip-on'));
    // valid next highlights
    if (s.path.length>0 && !s.over) {
      const last=s.path[s.path.length-1];
      [[-1,0],[1,0],[0,-1],[0,1]].forEach(([dr,dc])=>{
        const nr=last[0]+dr,nc=last[1]+dc;
        if(nr<0||nc<0||nr>=size||nc>=size)return;
        if(s.path.some(p=>p[0]===nr&&p[1]===nc))return;
        const num=s.cellOf[nr+'-'+nc];
        if(num){ const vn=s.path.map(p=>s.cellOf[p[0]+'-'+p[1]]).filter(Boolean); const mx=vn.length?Math.max(...vn):0; if(num!==mx+1)return; }
        $(`#zipBoard .gc[data-r="${nr}"][data-c="${nc}"]`).classList.add('zip-next');
      });
    }
    // disegna il serpentino colorato
    const svg=$('#zipSvg'); svg.innerHTML='';
    const u=100/size;
    const snakeColor = s.over ? '#f59e0b' : '#22c55e';
    const snakeDark  = s.over ? '#b45309' : '#15803d';
    // filled cell background
    s.path.forEach(([r,c])=>{
      const cx=c*u, cy=r*u;
      svg.append(makeSvg('rect',{x:cx+u*.05,y:cy+u*.05,width:u*.9,height:u*.9,rx:u*.18,fill:s.over?'rgba(245,158,11,.18)':'rgba(34,197,94,.18)'}));
    });
    if (s.path.length>1) {
      const pts=s.path.map(([r,c])=>`${c*u+u/2},${r*u+u/2}`).join(' ');
      // outer shadow stroke
      svg.append(makeSvg('polyline',{points:pts,fill:'none',stroke:'rgba(0,0,0,0.14)','stroke-width':u*0.52,'stroke-linecap':'round','stroke-linejoin':'round'}));
      // main solid snake body
      svg.append(makeSvg('polyline',{points:pts,fill:'none',stroke:snakeColor,'stroke-width':u*0.38,'stroke-linecap':'round','stroke-linejoin':'round'}));
      // inner highlight
      svg.append(makeSvg('polyline',{points:pts,fill:'none',stroke:'rgba(255,255,255,0.35)','stroke-width':u*0.14,'stroke-linecap':'round','stroke-linejoin':'round'}));
    }
    // head circle
    if (s.path.length>=1) {
      const head=s.path[s.path.length-1];
      const hx=head[1]*u+u/2, hy=head[0]*u+u/2;
      svg.append(makeSvg('circle',{cx:hx,cy:hy,r:u*0.28,fill:snakeDark,stroke:'#fff','stroke-width':u*0.06}));
      svg.append(makeSvg('circle',{cx:hx,cy:hy,r:u*0.18,fill:snakeColor}));
    }
  },
  checkWin() {
    const s=this.state; const total=s.puz.size*s.puz.size;
    if (s.path.length!==total) return;
    // ensure all numbers visited (they are, since coverage + order)
    s.over=true; clearInterval(this._timer); this.render();
    const ms=Date.now()-s.start; const time=fmtClock(ms);
    Stats.record('zip', true); Leaderboard.record('zip', ms); refreshHome();
    victoryModal({ game:'zip', ms, message:`Percorso completato in ${s.moves} mosse e ${time}!`, shareFn:()=>copyText(`MentePronta · Zip ${todayStr()}\nRisolto in ${time} 🔗\nmentepronta`) });
  }
};
function makeSvg(tag,attrs){ const n=document.createElementNS('http://www.w3.org/2000/svg',tag); for(const[k,v]of Object.entries(attrs))n.setAttribute(k,v); return n; }

   === DATA: TANGO (2 puzzle) ===
   0=empty 1=sun 2=moon. given=fixed. constraints between cells.

const TANGO_PUZZLES = [

    ],
    cons: [ {a:[0,1],b:[0,2],t:'='}, {a:[2,2],b:[2,3],t:'x'}, {a:[3,0],b:[4,0],t:'='}, {a:[5,2],b:[5,3],t:'x'} ]
  },
  {
    given: [

    ],

/* =========================================================
   === TANGO ===
   ========================================================= */
const Tango = {
  state: null,
  init() {
    const idx = dateSeed() % TANGO_PUZZLES.length;
    const puz = TANGO_PUZZLES[idx];
    const board = puz.given.map(r=>r.slice());
    this.state = { puz, board, over:false, start:Date.now() };
    const view = $('#view-tango'); view.innerHTML='';
    view.append(gameHeader('Tango', '3 soli e 3 lune per riga e colonna. Mai 3 uguali di fila. Rispetta = e ×.', [
      chip('','🔄 Reset','', ()=>this.reset()),
      chip('','❔','', ()=>helpModal('Come si gioca · Tango',[
        'Ogni <b>riga</b> e <b>colonna</b> deve avere esattamente 3 ☀️ e 3 🌙.',
        'Non più di <b>2 simboli uguali</b> adiacenti in orizzontale o verticale.',
        'Le caselle unite da <b>=</b> hanno lo stesso simbolo; quelle con <b>×</b> simboli diversi.',
        'Tocca una casella per ciclare: vuota → ☀️ → 🌙 → vuota.'
      ]))
    ]));
    view.append(el('div', { class:'stat-row' }, 'Tempo: ', el('b',{id:'tangoTime',text:'00:00'})));
    const wrap = el('div', { style:{position:'relative', width:'min(420px,92vw)', margin:'0 auto'} });
    const grid = el('div', { class:'grid-board tango-grid', id:'tangoBoard', role:'grid', 'aria-label':'Griglia Tango', style:{gridTemplateColumns:'repeat(6,1fr)', width:'100%'} });
    for (let r=0;r<6;r++) for (let c=0;c<6;c++) {
      const fixed = puz.given[r][c]!==0;
      const cell = el('div', { class:'gc'+(fixed?' fixed':''), 'data-r':r, 'data-c':c, role:'gridcell', tabindex:fixed?'-1':'0',
        'aria-label':`riga ${r+1} colonna ${c+1}`, style: fixed?{cursor:'default'}:{} });
      this.setCell(cell, board[r][c], false);
      grid.append(cell);
    }
    grid.addEventListener('click', e=>{ const cell=e.target.closest('.gc'); if(cell) this.cycle(+cell.dataset.r,+cell.dataset.c); });
    grid.addEventListener('keydown', e=>{ if(e.key===' '||e.key==='Enter'){ const cell=e.target.closest('.gc'); if(cell){e.preventDefault();this.cycle(+cell.dataset.r,+cell.dataset.c);} } });
    wrap.append(grid);
    view.append(wrap);
    // constraint markers
    this.drawConstraints(wrap, grid);
    this._timer = setInterval(()=>{ if(!this.state.over) $('#tangoTime').textContent=fmtClock(Date.now()-this.state.start); },1000);
    this.validate();
  },
  destroy() { clearInterval(this._timer); },
  setCell(cell, v, animate) { cell.innerHTML=''; if(v) cell.append(el('span',{class:'tango-sym'+(animate?' pop':''),text:['','☀️','🌙'][v]})); },
  reset() { const s=this.state; s.board=s.puz.given.map(r=>r.slice()); s.over=false; s.start=Date.now(); this.renderAll(); this.validate(); },
  drawConstraints(wrap, grid) {
    // place after layout
    requestAnimationFrame(()=>{
      this.state.puz.cons.forEach(con=>{
        const ca=$(`#tangoBoard .gc[data-r="${con.a[0]}"][data-c="${con.a[1]}"]`);
        const cb=$(`#tangoBoard .gc[data-r="${con.b[0]}"][data-c="${con.b[1]}"]`);
        const ra=ca.offsetLeft+ca.offsetWidth/2, rb=cb.offsetLeft+cb.offsetWidth/2;
        const ya=ca.offsetTop+ca.offsetHeight/2, yb=cb.offsetTop+cb.offsetHeight/2;
        const m=el('span',{class:con.t==='='?'tango-eq':'tango-x', text:con.t==='='?'=':'×', style:{ left:((ra+rb)/2-5)+'px', top:((ya+yb)/2-8)+'px' }});
        wrap.append(m);
      });
    });
  },
  cycle(r,c) {
    const s=this.state; if(s.over) return; if(s.puz.given[r][c]!==0) return;
    s.board[r][c]=(s.board[r][c]+1)%3;
    this.setCell($(`#tangoBoard .gc[data-r="${r}"][data-c="${c}"]`), s.board[r][c], true);
    this.validate();
  },
  renderAll() { for(let r=0;r<6;r++)for(let c=0;c<6;c++){ this.setCell($(`#tangoBoard .gc[data-r="${r}"][data-c="${c}"]`), this.state.board[r][c], false); } },
  validate() {
    const s=this.state; const b=s.board; const conflicts=new Set();
    const mark=(r,c)=>conflicts.add(r+'-'+c);
    // rows/cols counts >3 and triples
    for (let i=0;i<6;i++){
      let rs=0,rm=0,cs=0,cm=0;
      for(let j=0;j<6;j++){ if(b[i][j]===1)rs++;if(b[i][j]===2)rm++;if(b[j][i]===1)cs++;if(b[j][i]===2)cm++; }
      if(rs>3||rm>3)for(let j=0;j<6;j++)mark(i,j);
      if(cs>3||cm>3)for(let j=0;j<6;j++)mark(j,i);
    }
    // triples
    for(let r=0;r<6;r++)for(let c=0;c<6;c++){
      const v=b[r][c]; if(!v)continue;
      if(c<=3&&b[r][c+1]===v&&b[r][c+2]===v){mark(r,c);mark(r,c+1);mark(r,c+2);}
      if(r<=3&&b[r+1][c]===v&&b[r+2][c]===v){mark(r,c);mark(r+1,c);mark(r+2,c);}
    }
    // constraints
    s.puz.cons.forEach(con=>{
      const va=b[con.a[0]][con.a[1]], vb=b[con.b[0]][con.b[1]];
      if(va&&vb){ if(con.t==='='&&va!==vb){mark(...con.a);mark(...con.b);} if(con.t==='x'&&va===vb){mark(...con.a);mark(...con.b);} }
    });
    $$('#tangoBoard .gc').forEach(c=>c.classList.toggle('conflict', conflicts.has(c.dataset.r+'-'+c.dataset.c)));
    // win check
    let full=true; for(let r=0;r<6;r++)for(let c=0;c<6;c++)if(!b[r][c])full=false;
    if(full&&conflicts.size===0&&!s.over){ s.over=true; clearInterval(this._timer); const ms=Date.now()-s.start;
      Stats.record('tango',true); Leaderboard.record('tango', ms); refreshHome();
      victoryModal({ game:'tango', ms, message:`Griglia in equilibrio in ${fmtClock(ms)}!`, shareFn:()=>copyText(`MentePronta · Tango ${todayStr()}\nRisolto in ${fmtClock(ms)} ☀️🌙\nmentepronta`) }); }
  }
};

const QUEEN_COLORS = ['#fca5a5','#fdba74','#fde047','#86efac','#93c5fd','#c4b5fd','#f9a8d4','#a7f3d0'];

/* =========================================================
   === QUEEN ===
   ========================================================= */
const Queen = {
  state: null,
  init() {
    const idx = dateSeed() % QUEEN_PUZZLES.length;
    const puz = QUEEN_PUZZLES[idx]; const n=puz.n;
    this.state = { puz, n, marks: Array.from({length:n},()=>Array(n).fill(0)), over:false, start:Date.now() };
    const view = $('#view-queen'); view.innerHTML='';
    view.append(gameHeader('Queen', 'Una 👑 per ogni riga, colonna e regione colorata. Le regine non si toccano.', [
      chip('','🔄 Reset','', ()=>this.reset()),
      chip('','❔','', ()=>helpModal('Come si gioca · Queen',[
        'Posiziona <b>una corona 👑</b> per ogni riga, colonna e regione colorata.',
        'Le corone <b>non possono toccarsi</b>, nemmeno in diagonale.',
        'Primo tocco: ✕ (escludi la casella). Secondo tocco: 👑. Terzo: cancella.',
        'Le corone in conflitto sono evidenziate in rosso.'
      ]))
    ]));
    view.append(el('div', { class:'stat-row' }, 'Tempo: ', el('b',{id:'queenTime',text:'00:00'})));
    const card = el('div', { class:'board-card' });
    const grid = el('div', { class:'grid-board queen-grid', id:'queenBoard', role:'grid', 'aria-label':'Scacchiera Queen', style:{gridTemplateColumns:`repeat(${n},1fr)`, width:'min(420px,92vw)'} });
    const reg = puz.regions;
    for (let r=0;r<n;r++) for (let c=0;c<n;c++) {
      // bordi spessi tra regioni diverse (stile LinkedIn Queens)
      const T = r===0||reg[r-1][c]!==reg[r][c], B = r===n-1||reg[r+1][c]!==reg[r][c];
      const L = c===0||reg[r][c-1]!==reg[r][c], R = c===n-1||reg[r][c+1]!==reg[r][c];
      const thick='3px solid #111', thin='1px solid rgba(0,0,0,0.18)';
      const cell = el('div', { class:'gc queen-cell', 'data-r':r,'data-c':c, role:'gridcell', tabindex:'0',
        'aria-label':`riga ${r+1} colonna ${c+1}`, style:{ background:QUEEN_COLORS[reg[r][c]], borderRadius:'0', color:'#1a1a1a',
          borderTop:T?thick:thin, borderBottom:B?thick:thin, borderLeft:L?thick:thin, borderRight:R?thick:thin } });
      grid.append(cell);
    }
    grid.addEventListener('click', e=>{ const cell=e.target.closest('.gc'); if(cell)this.tap(+cell.dataset.r,+cell.dataset.c); });
    grid.addEventListener('keydown', e=>{ if(e.key===' '||e.key==='Enter'){const cell=e.target.closest('.gc');if(cell){e.preventDefault();this.tap(+cell.dataset.r,+cell.dataset.c);}} });
    card.append(grid); view.append(card);
    this._timer = setInterval(()=>{ if(!this.state.over) $('#queenTime').textContent=fmtClock(Date.now()-this.state.start); },1000);
    this.validate();
  },
  destroy(){ clearInterval(this._timer); },
  reset(){ const n=this.state.n; this.state.marks=Array.from({length:n},()=>Array(n).fill(0)); this.state.over=false; this.state.start=Date.now(); this.renderAll(); this.validate(); },
  tap(r,c){ const s=this.state; if(s.over)return; s.marks[r][c]=(s.marks[r][c]+1)%3; this.renderCell(r,c); this.validate(); },
  renderCell(r,c){ const cell=$(`#queenBoard .gc[data-r="${r}"][data-c="${c}"]`); const m=this.state.marks[r][c]; cell.innerHTML='';
    if(m===1) cell.append(el('span',{class:'q-x',text:'✕'})); else if(m===2) cell.append(el('span',{class:'q-crown',text:'👑'})); },
  renderAll(){ const n=this.state.n; for(let r=0;r<n;r++)for(let c=0;c<n;c++)this.renderCell(r,c); },
  validate(){
    const s=this.state; const n=s.n; const bad=new Set();
    const queens=[]; for(let r=0;r<n;r++)for(let c=0;c<n;c++)if(s.marks[r][c]===2)queens.push([r,c]);
    // row/col/region/adjacency conflicts
    for(let i=0;i<queens.length;i++)for(let j=i+1;j<queens.length;j++){
      const[a,b]=[queens[i],queens[j]];
      if(a[0]===b[0]||a[1]===b[1]||s.puz.regions[a[0]][a[1]]===s.puz.regions[b[0]][b[1]] || (Math.abs(a[0]-b[0])<=1&&Math.abs(a[1]-b[1])<=1)){
        bad.add(a[0]+'-'+a[1]); bad.add(b[0]+'-'+b[1]);
      }
    }
    $$('#queenBoard .gc').forEach(c=>c.classList.toggle('bad', bad.has(c.dataset.r+'-'+c.dataset.c)));
    if(queens.length===n && bad.size===0 && !s.over){
      s.over=true; clearInterval(this._timer); const ms=Date.now()-s.start;
      Stats.record('queen',true); Leaderboard.record('queen', ms); refreshHome();
      victoryModal({ game:'queen', ms, message:`Tutte le corone al loro posto in ${fmtClock(ms)}!`, shareFn:()=>copyText(`MentePronta · Queen ${todayStr()}\nRisolto in ${fmtClock(ms)} 👑\nmentepronta`) });
    }
  }
};

    board.addEventListener('click', e=>{ const cell=e.target.closest('.gc'); if(cell)this.place(+cell.dataset.r,+cell.dataset.c); });
    card.append(board);
    const tray = el('div', { class:'tray', id:'patchTray' });
    layout.append(card, tray);
    view.append(layout);
    this._key = e=>{ if(location.hash.replace('#','')!=='patches')return; if(e.key==='r'||e.key==='R')this.rotateSel(); };
    document.addEventListener('keydown', this._key);
    this._timer = setInterval(()=>{ if(!this.state.over) $('#patchTime').textContent=fmtClock(Date.now()-this.state.start); },1000);
    this.renderTray(); this.renderBoard();
  },
  destroy(){ if(this._key)document.removeEventListener('keydown',this._key); clearInterval(this._timer); },
  reset(){ this.state.pieces.forEach(p=>{p.placed=null;p.rot=0;p.cells=normShape(this.state.puz.pieces[p.id].cells);}); this.state.fill={}; this.state.selected=null; this.state.over=false; this.renderTray(); this.renderBoard(); },
  renderTray(){
    const tray=$('#patchTray'); tray.innerHTML='';
    this.state.pieces.forEach(p=>{
      const maxR=Math.max(...p.cells.map(c=>c[0]))+1, maxC=Math.max(...p.cells.map(c=>c[1]))+1;
      const pg=el('div',{ class:'piece'+(p.placed?' used':'')+(this.state.selected===p.id?' sel':''), 'data-id':p.id,
        style:{gridTemplateColumns:`repeat(${maxC},26px)`}, onclick:()=>this.selectPiece(p.id) });
      const set=new Set(p.cells.map(c=>c[0]+'-'+c[1]));
      for(let r=0;r<maxR;r++)for(let c=0;c<maxC;c++){
        pg.append(el('div',{ class:'pcell'+(set.has(r+'-'+c)?'':' empty'), style: set.has(r+'-'+c)?{background:p.color}:{} }));
      }
      tray.append(pg);
    });
  },
  selectPiece(id){ const p=this.state.pieces.find(x=>x.id===id); if(p.placed){ this.removePiece(id); return; } this.state.selected = this.state.selected===id?null:id; this.renderTray(); },
  rotateSel(){ const id=this.state.selected; if(id==null)return; const p=this.state.pieces.find(x=>x.id===id); p.cells=normShape(p.cells.map(([r,c])=>[c,-r])); p.rot=(p.rot+1)%4; this.renderTray(); },
  place(r,c){
    const id=this.state.selected; if(id==null){ toast('Seleziona prima un pezzo'); return; }
    const p=this.state.pieces.find(x=>x.id===id);
    const target=p.cells.map(([dr,dc])=>[r+dr,c+dc]);
    for(const[tr,tc]of target){ if(!this.state.targetSet.has(tr+'-'+tc)){ toast('Fuori dalla forma'); this.flash(target,false); return; } if(this.state.fill[tr+'-'+tc]!=null){ toast('Sovrapposizione'); this.flash(target,false); return; } }
    target.forEach(([tr,tc])=>this.state.fill[tr+'-'+tc]=id);
    p.placed=[r,c]; this.state.selected=null;
    this.renderTray(); this.renderBoard();
    this.checkWin();
  },
  removePiece(id){ for(const k in this.state.fill)if(this.state.fill[k]===id)delete this.state.fill[k]; this.state.pieces.find(x=>x.id===id).placed=null; this.renderTray(); this.renderBoard(); },
  flash(cells,ok){ cells.forEach(([r,c])=>{ const cell=$(`#patchBoard .gc[data-r="${r}"][data-c="${c}"]`); if(cell){ cell.style.boxShadow=`inset 0 0 0 3px ${ok?'var(--color-success)':'var(--color-error)'}`; setTimeout(()=>cell.style.boxShadow='',500); } }); },
  renderBoard(){
    $$('#patchBoard .gc').forEach(cell=>{
      const k=cell.dataset.r+'-'+cell.dataset.c;
      if(!this.state.targetSet.has(k))return;
      const id=this.state.fill[k];
      if(id!=null){ const col=this.state.pieces.find(p=>p.id===id).color; cell.style.background=col; cell.style.boxShadow='inset 0 -3px 0 rgba(0,0,0,0.14), inset 0 3px 0 rgba(255,255,255,0.4)'; }
      else { cell.style.background='var(--color-surface-2)'; cell.style.boxShadow='inset 0 0 0 2px var(--color-border)'; }
    });
    const left=this.state.pieces.filter(p=>!p.placed).length; const ll=$('#patchLeft'); if(ll) ll.textContent=left;
  },
  checkWin(){
    const s=this.state; if(s.over)return;
    for(const k of s.targetSet) if(s.fill[k]==null) return;
    s.over=true; clearInterval(this._timer); const ms=Date.now()-s.start;
    Stats.record('patches',true); Leaderboard.record('patches', ms); refreshHome();
    victoryModal({ game:'patches', ms, message:`Forma completata in ${fmtClock(ms)}!`, shareFn:()=>copyText(`MentePronta · Patches ${todayStr()}\nRisolto in ${fmtClock(ms)} 🧩\nmentepronta`) });
  }
};
function normShape(cells){
  const minR=Math.min(...cells.map(c=>c[0])), minC=Math.min(...cells.map(c=>c[1]));
  return cells.map(([r,c])=>[r-minR,c-minC]).sort((a,b)=>a[0]-b[0]||a[1]-b[1]);
}

const Memoria = {
  state: null,
  diffs: { Facile:8, Medio:10, Difficile:12 },
  cols: { 8:4, 10:5, 12:6 },
  init() {
    if (!this.state) this.state = { diff:'Facile' };
    this.start(this.state.diff);
  },
  destroy(){},
  start(diff) {
    const pairs = this.diffs[diff];
    const rnd = seededRand(diff.length+5);
    const chosen = shuffle(MEMORIA_PAIRS, rnd).slice(0, pairs);
    const deck = shuffle(chosen.flatMap((p,i)=>[{id:i,...p},{id:i,...p}]), seededRand(pairs));
    this.state = { diff, deck, flipped:[], matched:0, flips:0, start:Date.now(), over:false, lock:false };
    const view = $('#view-memoria'); view.innerHTML='';
    view.append(gameHeader('Memoria', 'Trova tutte le coppie di parole italiane girando le carte.', [
      ...Object.keys(this.diffs).map(d=>chip('toggle'+(d===diff?' on':''), d, 'memd'+d, ()=>this.start(d))),
      chip('','❔','', ()=>helpModal('Come si gioca · Memoria',[
        'Gira due carte alla volta: se combaciano restano scoperte.',
        'Trova tutte le coppie nel minor numero di mosse e tempo.',
        'Difficoltà: Facile (8), Medio (10), Difficile (12 coppie).'
      ]))
    ]));
    view.append(el('div', { class:'stat-row' }, 'Mosse: ', el('b',{id:'memFlips',text:'0'}), 'Coppie: ', el('b',{id:'memPairs',text:'0/'+pairs}), 'Tempo: ', el('b',{id:'memTime',text:'00:00'})));
    const cols = this.cols[pairs];
    const grid = el('div', { class:'mem-grid', id:'memGrid', role:'grid', 'aria-label':'Carte memoria', style:{gridTemplateColumns:`repeat(${cols},1fr)`} });
    this.state.deck.forEach((card,i)=>{
      const c = el('div', { class:'mem-card', 'data-i':i, role:'gridcell', tabindex:'0', 'aria-label':'carta coperta',
        onclick:()=>this.flip(i) });
      c.append(el('div', { class:'mem-inner' },
        el('div', { class:'mem-face mem-front', text:'?' }),
        el('div', { class:'mem-face mem-back' }, el('span',{text:card[0]}), el('small',{text:card[1]}))
      ));
      grid.append(c);
    });
    view.append(grid);
    this._timer = setInterval(()=>{ if(!this.state.over){ const s=Math.floor((Date.now()-this.state.start)/1000); $('#memTime').textContent=`${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`; } },1000);
  },
  flip(i) {
    const s=this.state; if(s.lock||s.over)return;
    const card=$(`#memGrid .mem-card[data-i="${i}"]`);
    if(card.classList.contains('flipped')||card.classList.contains('matched'))return;
    card.classList.add('flipped'); s.flipped.push(i);
    if(s.flipped.length===2){
      s.flips++; $('#memFlips').textContent=s.flips; s.lock=true;
      const [a,b]=s.flipped;
      if(s.deck[a].id===s.deck[b].id){
        setTimeout(()=>{ [a,b].forEach(x=>$(`#memGrid .mem-card[data-i="${x}"]`).classList.add('matched')); s.matched++; $('#memPairs').textContent=s.matched+'/'+this.diffs[s.diff]; s.flipped=[]; s.lock=false; this.checkWin(); },450);
      } else {
        setTimeout(()=>{ [a,b].forEach(x=>$(`#memGrid .mem-card[data-i="${x}"]`).classList.remove('flipped')); s.flipped=[]; s.lock=false; },800);
      }
    }
  },
  checkWin() {
    const s=this.state; if(s.matched!==this.diffs[s.diff])return;
    s.over=true; clearInterval(this._timer);
    const ms=Date.now()-s.start; const time=fmtClock(ms);
    Stats.record('memoria',true); Leaderboard.record('memoria', ms); refreshHome();
    victoryModal({ game:'memoria', ms, message:`Tutte le coppie trovate in ${s.flips} mosse e ${time}!`, shareFn:()=>copyText(`MentePronta · Memoria ${todayStr()}\n${s.flips} mosse · ${time} 🃏\nmentepronta`) });
  }
};

const Anagramma = {
  state: null,
  init() {
    const idx = dateSeed() % ANAGRAMMA_SET.length;
    const word = ANAGRAMMA_SET[idx];
    const rnd = seededRand(3);
    let scrambled;
    do { scrambled = shuffle(word.split(''), rnd); } while (scrambled.join('')===word);
    this.state = { word, pool: scrambled.map((ch,i)=>({ch,id:i,used:false})), slots: Array(word.length).fill(null), attempts:0, max:3, over:false };
    const view = $('#view-anagramma'); view.innerHTML='';
    view.append(gameHeader('Anagramma', 'Riordina le lettere per ricostruire la parola italiana nascosta.', [

        'Clicca le lettere in basso per inserirle negli spazi.',
        'Clicca una lettera negli spazi per rimuoverla.',

      ]))
    ]));
    view.append(el('div',{class:'stat-row'}, 'Lettere: ', el('b',{text:word.length}), 'Tentativi: ', el('b',{id:'anaAtt',text:'0/3'})));
    const wrap = el('div', { class:'ana-wrap' });
    wrap.append(el('div', { class:'ana-slots', id:'anaSlots', role:'group', 'aria-label':'Parola in costruzione' }));
    wrap.append(el('div', { class:'ana-pool', id:'anaPool', role:'group', 'aria-label':'Lettere disponibili' }));
    wrap.append(el('div', { style:{display:'flex',gap:'0.6rem',marginTop:'0.5rem'} },
      el('button', { class:'btn-primary', id:'anaCheck', onclick:()=>this.check(), text:'Verifica' }),
      el('button', { class:'btn-ghost', onclick:()=>this.clearSlots(), text:'Cancella' })
    ));
    view.append(wrap);
    this.render();
  },
  destroy(){},
  shufflePool(){ const s=this.state; const free=s.pool.filter(p=>!p.used); const sh=shuffle(free,mulberry32(Date.now())); let i=0; s.pool=s.pool.map(p=>p.used?p:sh[i++]); this.render(); },
  clearSlots(){ const s=this.state; s.slots.fill(null); s.pool.forEach(p=>p.used=false); this.render(); },
  render(){
    const s=this.state;
    const slots=$('#anaSlots'); slots.innerHTML='';
    s.slots.forEach((p,i)=>{
      const t=el('div',{ class:'ana-tile placed', 'data-slot':i, onclick:()=>this.removeFromSlot(i), 'aria-label':p?p.ch:'vuoto' });
      t.textContent=p?p.ch:''; if(!p){t.classList.remove('placed'); t.style.background='var(--color-surface-2)';}
      slots.append(t);
    });
    const pool=$('#anaPool'); pool.innerHTML='';
    s.pool.forEach(p=>{
      if(p.used)return;
      pool.append(el('div',{ class:'ana-tile', onclick:()=>this.addToSlot(p.id), 'aria-label':'lettera '+p.ch, text:p.ch }));
    });
    $('#anaAtt').textContent=s.attempts+'/'+s.max;
  },
  addToSlot(id){ const s=this.state; const p=s.pool.find(x=>x.id===id); if(p.used)return; const i=s.slots.indexOf(null); if(i<0)return; s.slots[i]=p; p.used=true; this.render(); },
  removeFromSlot(i){ const s=this.state; const p=s.slots[i]; if(!p)return; p.used=false; s.slots[i]=null; this.render(); },
  check(){
    const s=this.state; if(s.over)return;
    if(s.slots.includes(null)){ toast('Completa la parola'); return; }
    const guess=s.slots.map(p=>p.ch).join('');
    if(guess===s.word){ s.over=true; Stats.record('anagramma',true); refreshHome();
      victoryModal({ game:'anagramma', message:`Esatto! La parola era ${s.word}.`, shareFn:()=>copyText(`MentePronta · Anagramma ${todayStr()}\nIndovinata al tentativo ${s.attempts+1} 🔡\nmentepronta`) });
      return;
    }
    s.attempts++; this.render();
    if(s.attempts>=s.max){ s.over=true; Stats.record('anagramma',false); refreshHome();
      gameOverModal({ game:'anagramma', message:`La parola era: <strong>${s.word}</strong>` });
    } else { toast(`Sbagliato! Tentativi rimasti: ${s.max-s.attempts}`); this.clearSlots(); }
  }
};

    document.addEventListener('keydown',this._key);

  },
  destroy(){ clearInterval(this._timer); if(this._key)document.removeEventListener('keydown',this._key); },
  select(i){ this.state.sel=i; this.highlight(); },
  moveSel(key){ let i=this.state.sel; if(i<0){this.select(0);return;} let r=Math.floor(i/9),c=i%9; const m={ArrowUp:[-1,0],ArrowDown:[1,0],ArrowLeft:[0,-1],ArrowRight:[0,1]}[key]; r=Math.max(0,Math.min(8,r+m[0])); c=Math.max(0,Math.min(8,c+m[1])); this.select(r*9+c); },
  place(n){ const s=this.state; if(s.over||s.sel<0||s.given[s.sel])return; s.grid[s.sel]=n; this.render(); this.checkWin(); },
  erase(){ const s=this.state; if(s.over||s.sel<0||s.given[s.sel])return; s.grid[s.sel]=0; this.render(); },
  render(){ for(let i=0;i<81;i++){ const cell=$(`#sudGrid .sud-cell[data-i="${i}"]`); cell.textContent=this.state.grid[i]||''; } this.highlight(); },
  highlight(){
    const s=this.state;
    $$('#sudGrid .sud-cell').forEach(c=>c.classList.remove('sel','peer','same','bad'));
    if(s.sel>=0){
      const r=Math.floor(s.sel/9),c=s.sel%9; const val=s.grid[s.sel];
      $$('#sudGrid .sud-cell').forEach(cell=>{ const i=+cell.dataset.i, cr=Math.floor(i/9), cc=i%9;
        if(cr===r||cc===c||(Math.floor(cr/3)===Math.floor(r/3)&&Math.floor(cc/3)===Math.floor(c/3))) cell.classList.add('peer');
        if(val&&s.grid[i]===val) cell.classList.add('same'); });
      $(`#sudGrid .sud-cell[data-i="${s.sel}"]`).classList.add('sel');
    }
    for(let i=0;i<81;i++){ const v=s.grid[i]; if(!v)continue; const ri=Math.floor(i/9),ci=i%9;
      for(let j=0;j<81;j++){ if(j===i)continue; if(s.grid[j]!==v)continue; const rj=Math.floor(j/9),cj=j%9;
        if(ri===rj||ci===cj||(Math.floor(ri/3)===Math.floor(rj/3)&&Math.floor(ci/3)===Math.floor(cj/3))){ $(`#sudGrid .sud-cell[data-i="${i}"]`).classList.add('bad'); break; } } }
  },
  checkWin(){ const s=this.state; for(let i=0;i<81;i++) if(s.grid[i]!==s.sol[i]) return; s.over=true; clearInterval(this._timer); const ms=Date.now()-s.start;
    Stats.record('sudoku',true); Leaderboard.record('sudoku',ms); refreshHome();
    victoryModal({game:'sudoku',ms,message:`Sudoku risolto in ${fmtClock(ms)}!`,shareFn:()=>copyText(`MentePronta · Sudoku ${todayStr()}\nRisolto in ${fmtClock(ms)} 🔢\nmentepronta`)}); }
};

const Mine = {
  state:null, SIZE:9, MINES:10,
  nbrs(i){ const N=this.SIZE,r=Math.floor(i/N),c=i%N,res=[]; for(let dr=-1;dr<=1;dr++)for(let dc=-1;dc<=1;dc++){ if(!dr&&!dc)continue; const nr=r+dr,nc=c+dc; if(nr>=0&&nc>=0&&nr<N&&nc<N)res.push(nr*N+nc); } return res; },
  init(){
    const N=this.SIZE,total=N*N; let mines,numbers,safe=-1;
    for(let a=0;a<300;a++){ const rnd=mulberry32(dateSeed()+a*131); mines=new Set(); while(mines.size<this.MINES) mines.add(Math.floor(rnd()*total));
      numbers=Array(total).fill(0); for(let i=0;i<total;i++){ if(mines.has(i))continue; let cnt=0; this.nbrs(i).forEach(j=>{if(mines.has(j))cnt++;}); numbers[i]=cnt; }
      safe=-1; for(let i=0;i<total;i++){ if(!mines.has(i)&&numbers[i]===0){ safe=i; break; } } if(safe>=0)break; }
    this.state={ mines,numbers,revealed:new Set(),flags:new Set(),over:false,won:false,start:Date.now(),flagMode:false };

    view.append(el('div',{class:'stat-row'},'Mine: ',el('b',{id:'mineCount',text:String(this.MINES)}),'Tempo: ',el('b',{id:'mineTime',text:'00:00'})));
    const card=el('div',{class:'board-card'});
    const g=el('div',{class:'mine-grid',id:'mineGrid',role:'grid','aria-label':'Campo Minato',style:{gridTemplateColumns:`repeat(${N},1fr)`}});
    for(let i=0;i<total;i++) g.append(el('div',{class:'mine-cell','data-i':i,role:'gridcell'}));
    g.addEventListener('click',e=>{const c=e.target.closest('.mine-cell'); if(c)this.tap(+c.dataset.i);});
    g.addEventListener('contextmenu',e=>{e.preventDefault(); const c=e.target.closest('.mine-cell'); if(c)this.toggleFlag(+c.dataset.i);});
    card.append(g); view.append(card);
    this._timer=setInterval(()=>{ if(!this.state.over)$('#mineTime').textContent=fmtClock(Date.now()-this.state.start); },1000);
    if(safe>=0) this.reveal(safe);
  },
  destroy(){ clearInterval(this._timer); },
  toggleFlagMode(){ this.state.flagMode=!this.state.flagMode; $('#mineFlag').classList.toggle('on',this.state.flagMode); },
  tap(i){ const s=this.state; if(s.over)return; if(s.flagMode) this.toggleFlag(i); else this.reveal(i); },
  toggleFlag(i){ const s=this.state; if(s.over||s.revealed.has(i))return; if(s.flags.has(i))s.flags.delete(i); else s.flags.add(i); this.renderCell(i);
    $('#mineCount').textContent=String(this.MINES-s.flags.size); },
  reveal(i){ const s=this.state; if(s.over||s.flags.has(i)||s.revealed.has(i))return;
    if(s.mines.has(i)){ this.lose(i); return; }
    const stack=[i];
    while(stack.length){ const j=stack.pop(); if(s.revealed.has(j)||s.flags.has(j))continue; s.revealed.add(j); this.renderCell(j);
      if(s.numbers[j]===0) this.nbrs(j).forEach(k=>{ if(!s.revealed.has(k)&&!s.mines.has(k))stack.push(k); }); }
    this.checkWin();
  },
  renderCell(i){ const cell=$(`#mineGrid .mine-cell[data-i="${i}"]`); const s=this.state;
    cell.classList.remove('flag','open'); cell.textContent=''; cell.removeAttribute('data-n');
    if(s.revealed.has(i)){ cell.classList.add('open'); const n=s.numbers[i]; if(n>0){ cell.textContent=String(n); cell.setAttribute('data-n',n); } }
    else if(s.flags.has(i)){ cell.classList.add('flag'); cell.textContent='🚩'; }
    else if(s.over && s.mines.has(i)){ cell.textContent='💣'; }
  },
  lose(hit){ const s=this.state; s.over=true; s.won=false; clearInterval(this._timer);
    s.mines.forEach(m=>this.renderCell(m)); const hc=$(`#mineGrid .mine-cell[data-i="${hit}"]`); hc.classList.add('boom'); hc.textContent='💥';
    Stats.record('mine',false); refreshHome();
    gameOverModal({game:'mine',title:'💥 Boom!',message:'Hai colpito una mina. Riprova domani con un nuovo campo!'});
  },
  checkWin(){ const s=this.state; if(s.revealed.size!==this.SIZE*this.SIZE-this.MINES)return; s.over=true; s.won=true; clearInterval(this._timer);
    s.mines.forEach(m=>{ if(!s.flags.has(m)){ s.flags.add(m); this.renderCell(m); } }); const ms=Date.now()-s.start;
    Stats.record('mine',true); Leaderboard.record('mine',ms); refreshHome();
    victoryModal({game:'mine',ms,message:`Campo bonificato in ${fmtClock(ms)}!`,shareFn:()=>copyText(`MentePronta · Campo Minato ${todayStr()}\nRisolto in ${fmtClock(ms)} 💣\nmentepronta`)}); }
};

/* =========================================================
   === QUINDICI (15-puzzle) ===
   ========================================================= */
const Quindici = {
  state:null,
  neighbors(i,N){ const r=Math.floor(i/N),c=i%N,res=[]; if(r>0)res.push(i-N); if(r<N-1)res.push(i+N); if(c>0)res.push(i-1); if(c<N-1)res.push(i+1); return res; },
  init(){
    const N=4; const board=[...Array(15).keys()].map(x=>x+1); board.push(0); let blank=15;
    const rnd=seededRand(13); let last=-1;
    for(let k=0;k<400;k++){ const nb=this.neighbors(blank,N).filter(x=>x!==last); const pick=nb[Math.floor(rnd()*nb.length)]; [board[blank],board[pick]]=[board[pick],board[blank]]; last=blank; blank=pick; }
    this.state={ board,blank,N,moves:0,over:false,start:Date.now() };
    const view=$('#view-quindici'); view.innerHTML='';
    view.append(gameHeader('Quindici','Fai scorrere le tessere e rimettile in ordine da 1 a 15.', [
      chip('','❔','',()=>helpModal('Come si gioca · Quindici',[
        'Tocca una tessera <b>adiacente allo spazio vuoto</b> per farla scorrere.',
        'Obiettivo: ordinare le tessere da <b>1 a 15</b>, con lo spazio vuoto in basso a destra.',
        'Vince chi ci riesce nel minor tempo!'
      ]))
    ]));
    view.append(el('div',{class:'stat-row'},'Mosse: ',el('b',{id:'q15Moves',text:'0'}),'Tempo: ',el('b',{id:'q15Time',text:'00:00'})));
    const card=el('div',{class:'board-card'});
    const g=el('div',{class:'q15-grid',id:'q15Grid',role:'grid','aria-label':'Quindici'});
    for(let i=0;i<16;i++) g.append(el('div',{class:'q15-tile','data-i':i,role:'gridcell'}));
    g.addEventListener('click',e=>{const c=e.target.closest('.q15-tile'); if(c)this.tap(+c.dataset.i);});
    card.append(g); view.append(card);
    this._timer=setInterval(()=>{ if(!this.state.over)$('#q15Time').textContent=fmtClock(Date.now()-this.state.start); },1000);
    this.render();
  },
  destroy(){ clearInterval(this._timer); },
  tap(i){ const s=this.state; if(s.over)return; if(this.neighbors(s.blank,s.N).includes(i)){ [s.board[s.blank],s.board[i]]=[s.board[i],s.board[s.blank]]; s.blank=i; s.moves++; $('#q15Moves').textContent=String(s.moves); this.render(); this.checkWin(); } },
  render(){ const s=this.state; for(let i=0;i<16;i++){ const t=$(`#q15Grid .q15-tile[data-i="${i}"]`); const v=s.board[i]; t.textContent=v||''; t.classList.toggle('blank',v===0); t.classList.toggle('done',v!==0&&v===i+1); } },
  checkWin(){ const s=this.state; for(let i=0;i<15;i++) if(s.board[i]!==i+1)return; s.over=true; clearInterval(this._timer); const ms=Date.now()-s.start;
    Stats.record('quindici',true); Leaderboard.record('quindici',ms); refreshHome();
    victoryModal({game:'quindici',ms,message:`Risolto in ${s.moves} mosse e ${fmtClock(ms)}!`,shareFn:()=>copyText(`MentePronta · Quindici ${todayStr()}\n${s.moves} mosse · ${fmtClock(ms)} 🧮\nmentepronta`)}); }
};

const CONN_COLORS = ['#e0b94e','#7bb054','#5a8fd6','#a56bc9'];
const Connessioni = {
  state:null,
  init(){
    const set=CONNESSIONI_SETS[dateSeed()%CONNESSIONI_SETS.length];
    const rnd=seededRand(17); const all=[]; set.forEach((g,gi)=>g.words.forEach(w=>all.push({w,gi})));
    this.state={ set, words:shuffle(all,rnd), selected:[], solved:[], mistakes:0, max:4, over:false, start:Date.now() };
    const view=$('#view-connessioni'); view.innerHTML='';
    view.append(gameHeader('Connessioni','Trova quattro gruppi di quattro parole che hanno qualcosa in comune.', [
      chip('','❔','',()=>helpModal('Come si gioca · Connessioni',[
        'Le 16 parole formano <b>4 gruppi da 4</b> con un tema in comune.',
        'Seleziona 4 parole e premi <b>Invia</b>: se sono un gruppo, vengono bloccate.',
        'Hai <b>4 errori</b> a disposizione. Indovina tutti i gruppi per vincere!'
      ]))
    ]));
    view.append(el('div',{class:'stat-row'},'Errori: ',el('b',{id:'connLives',text:'0/4'}),'Tempo: ',el('b',{id:'connTime',text:'00:00'})));
    view.append(el('div',{class:'conn-solved',id:'connSolved'}));
    view.append(el('div',{class:'conn-grid',id:'connGrid',role:'group','aria-label':'Parole'}));
    view.append(el('div',{class:'conn-actions'},
      el('button',{class:'btn-ghost',id:'connShuffle',onclick:()=>this.shuffleWords(),text:'🔀 Mescola'}),
      el('button',{class:'btn-ghost',onclick:()=>{this.state.selected=[];this.renderGrid();},text:'Deseleziona'}),
      el('button',{class:'btn-primary',id:'connSubmit',onclick:()=>this.submit(),text:'Invia'})
    ));
    this._timer=setInterval(()=>{ if(!this.state.over)$('#connTime').textContent=fmtClock(Date.now()-this.state.start); },1000);
    this.renderGrid();
  },
  destroy(){ clearInterval(this._timer); },
  shuffleWords(){ this.state.words=shuffle(this.state.words,mulberry32(Date.now())); this.renderGrid(); },
  toggle(w){ const s=this.state; if(s.over)return; const k=w.w; const idx=s.selected.indexOf(k); if(idx>=0)s.selected.splice(idx,1); else { if(s.selected.length>=4)return; s.selected.push(k); } this.renderGrid(); },
  renderSolved(){ const c=$('#connSolved'); c.innerHTML=''; this.state.solved.forEach(gi=>{ const g=this.state.set[gi]; c.append(el('div',{class:'conn-band',style:{background:CONN_COLORS[gi]}}, el('b',{text:g.cat.toUpperCase()}), el('span',{text:g.words.join(' · ')}))); }); },
  renderGrid(){
    const s=this.state; this.renderSolved();
    const grid=$('#connGrid'); grid.innerHTML='';
    s.words.forEach(item=>{ if(s.solved.includes(item.gi))return; const sel=s.selected.includes(item.w);
      grid.append(el('div',{class:'conn-tile'+(sel?' sel':''),onclick:()=>this.toggle(item),text:item.w})); });
    $('#connLives').textContent=s.mistakes+'/'+s.max;
    const sub=$('#connSubmit'); if(sub) sub.disabled=s.selected.length!==4;
  },
  submit(){
    const s=this.state; if(s.over||s.selected.length!==4)return;
    const items=s.words.filter(x=>s.selected.includes(x.w)); const gi=items[0].gi;
    if(items.every(x=>x.gi===gi)){ s.solved.push(gi); s.selected=[]; this.renderGrid();
      if(s.solved.length===4){ s.over=true; clearInterval(this._timer); const ms=Date.now()-s.start;
        Stats.record('connessioni',true); Leaderboard.record('connessioni',ms); refreshHome();
        victoryModal({game:'connessioni',ms,message:`Tutti i gruppi trovati in ${fmtClock(ms)}!`,shareFn:()=>copyText(`MentePronta · Connessioni ${todayStr()}\nRisolto in ${fmtClock(ms)} 🧠\nmentepronta`)}); }
    } else {
      s.mistakes++; $('#connLives').textContent=s.mistakes+'/'+s.max;
      const grid=$('#connGrid'); grid.classList.add('shake'); setTimeout(()=>grid.classList.remove('shake'),500);
      toast(items.filter(x=>x.gi===items[0].gi).length===3?'Quasi! Tre su quattro':'Gruppo sbagliato');
      s.selected=[];
      if(s.mistakes>=s.max){ s.over=true; clearInterval(this._timer);
        s.set.forEach((g,i)=>{ if(!s.solved.includes(i))s.solved.push(i); }); this.renderGrid();
        Stats.record('connessioni',false); refreshHome();
        gameOverModal({game:'connessioni',title:'Peccato!',message:'Errori finiti. Ecco i gruppi corretti. Riprova domani!'});
      } else this.renderGrid();
    }
  }
};

function gameHeader(title, desc, actions) {
  const gameId = location.hash.replace('#','');
  const head = el('div', { class:'game-head', 'data-watermark': title.toUpperCase() });
  // Art illustration (right side)
  const artSvg = HEADER_SVG[gameId];
  if (artSvg) {
    const art = el('div', { class:'gh-art' });
    art.innerHTML = artSvg;
    head.append(art);
  }
  head.append(
    el('div', { class:'gh-main' },
      el('a', { class:'gh-back', href:'#home', 'aria-label':'Torna ai giochi',
        html:'<svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg><span>Giochi</span>' }),
      el('h1', { text:title }),
      el('p', { text:desc })
    ),
    el('div', { class:'actions' }, ...actions)
  );
  return head;
}
function chip(extra, label, id, onclick) {
  const props = { class:'chip-btn '+extra, onclick };
  if (id) props.id = id;
  return el('button', props, label);
}

/* =========================================================
   === HOME PAGE ===
   ========================================================= */
function renderHome() {
  const view = $('#view-home'); view.innerHTML='';
  const d = new Date();
  const dayName = d.toLocaleDateString('it-IT',{ weekday:'long' }).toUpperCase();
  const ddate  = d.toLocaleDateString('it-IT',{ day:'numeric', month:'long', year:'numeric' });

  /* ── Header strip ── */
  view.append(el('div',{ class:'pg-head' },
    el('div',{ class:'pg-head-left' },
      el('span',{ class:'pg-eyebrow', text: dayName + ' · ' + ddate }),
      el('h1',{ class:'pg-title' },
        el('span',{ text:'Mente' }),
        el('span',{ class:'pg-title-accent', text:'Pronta' })
      )
    ),
    el('div',{ class:'pg-subtitle', text:'12 puzzle originali, ogni giorno.' })
  ));

  /* ── Poster grid ── */
  const grid = el('div',{ class:'pg-grid', id:'homeGrid' });
  const ORDER = [
    'parole','connessioni','sudoku','zip',
    'tango','queen','cruciverba','patches',
    'memoria','anagramma','mine','quindici'
  ];
  ORDER.forEach((id,i) => {
    const g = GAMES.find(x=>x.id===id);
    if(g) grid.append(makePosterCard(g,i));
  });
  view.append(grid);
}

function makePosterCard(g, i) {
  const s = Stats.get(g.id);
  const locked = Plays.isLocked(g.id);
  const card = el('a',{
    class: 'pc' + (locked?' pc--done':''),
    href: '#'+g.id, 'data-game': g.id, 'aria-label': g.name
  });
  // CSS custom properties MUST use setProperty — Object.assign on style doesn't work for vars
  card.style.setProperty('--i', i);
  card.style.setProperty('--ca', g.color);
  card.style.animationDelay = (i * 42) + 'ms';

  /* Coloured background */
  const bg = el('div',{ class:'pc-bg' });

  /* SVG art — big, centered */
  const art = el('div',{ class:'pc-art' });
  const artSrc = GAME_ART[g.id];
  if(artSrc) {
    const tmp = el('div');
    tmp.innerHTML = artSrc.replace('viewBox="0 0 80 80"', 'viewBox="0 0 80 80" width="100" height="100"');
    const svg = tmp.querySelector('svg');
    if(svg) art.append(svg);
  } else {
    art.append(el('span',{ text:g.emoji, style:{ fontSize:'3.5rem', lineHeight:'1' } }));
  }

  /* Footer info */
  const foot = el('div',{ class:'pc-foot' });
  foot.append(
    el('div',{ class:'pc-foot-row' },
      el('strong',{ class:'pc-name', text:g.name }),
      el('span',{ class:'pc-diff pc-diff--'+g.diff.toLowerCase(), text:g.diff })
    )
  );
  if(locked) foot.append(el('div',{ class:'pc-done', text:'✓ Fatto' }));
  else foot.append(el('div',{ class:'pc-cta', text:'Gioca ›' }));

  card.append(bg, art, foot);
  return card;
}

/* Legacy aliases */
function newGameCard(g,i){ return makePosterCard(g,i); }
function makeHeroCard(g,i){ return makePosterCard(g,i); }
function makeRowCard(g,i){ return makePosterCard(g,i); }
